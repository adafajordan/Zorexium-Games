<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Messages</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      :root {
        color-scheme: light;
        --bg: #ffffff;
        --surface: #f5f5f5;
        --surface-soft: #eeeeee;
        --text: #111111;
        --text-muted: #333333;
        --text-soft: #666666;
        --text-placeholder: #999999;
        --border: #e0e0e0;
        --border-strong: #cccccc;
        --focus: #e02020;
        --accent: #cc2222;
        --sticky-footer-height: 62px;
        --sticky-footer-padding-x: 6px;
      }
      [hidden] { display: none !important; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100dvh;
      }

      /* ── Shared header ─────────────────────────────────────────── */
      .msg-header {
        position: sticky;
        top: 0;
        z-index: 50;
        display: flex;
        align-items: center;
        padding: 0 14px;
        height: 56px;
        background: rgba(255,255,255,0.97);
        border-bottom: 1px solid var(--border);
        backdrop-filter: blur(6px);
        gap: 10px;
        flex-shrink: 0;
      }
      .msg-header-left,
      .msg-header-right {
        display: flex;
        align-items: center;
        gap: 6px;
        flex: 0 0 auto;
        min-width: 44px;
      }
      .msg-header-right { justify-content: flex-end; }
      .msg-header-center {
        flex: 1 1 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 17px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .msg-icon-btn {
        background: none;
        border: none;
        color: var(--text);
        cursor: pointer;
        padding: 6px;
        border-radius: 6px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 0;
      }
      .msg-icon-btn:hover { background: var(--surface-soft); color: var(--accent); }
      .msg-icon-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }

      /* avatar chip */
      .avatar-chip {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        border: 0;
        padding: 0;
        overflow: hidden;
        background: #93a2b7;
        color: #fff;
        font-weight: 700;
        font-size: 13px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        position: relative;
      }
      .avatar-chip img { width: 100%; height: 100%; object-fit: cover; display: block; }
      .avatar-chip-static { cursor: default; }

      /* thread header user info */
      .thread-header-center { justify-content: flex-start; padding-left: 2px; }
      .thread-user-name {
        font-size: 15px;
        font-weight: 700;
        line-height: 1.2;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 160px;
      }
      .thread-user-handle { font-size: 12px; color: var(--text-soft); font-weight: 400; }

      /* ── INBOX view ─────────────────────────────────────────────── */
      #inbox-view {
        display: flex;
        flex-direction: column;
        min-height: 100dvh;
        padding-bottom: calc(var(--sticky-footer-height) + 8px);
      }

      .inbox-search-wrap {
        padding: 10px 14px 0;
      }
      .inbox-search {
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 8px 14px;
        width: 100%;
      }
      .inbox-search svg { flex-shrink: 0; width: 18px; height: 18px; stroke: var(--text-placeholder); fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
      .inbox-search input {
        flex: 1;
        border: 0;
        outline: 0;
        background: transparent;
        font-family: inherit;
        font-size: 14px;
        color: var(--text);
      }
      .inbox-search input::placeholder { color: var(--text-placeholder); }

      /* conversation list */
      .conv-list {
        flex: 1;
        overflow-y: auto;
        padding: 6px 0 0;
      }
      .conv-row {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 14px;
        cursor: pointer;
        border-bottom: 1px solid var(--border);
        background: var(--bg);
        transition: background 0.1s;
      }
      .conv-row:hover { background: var(--surface); }
      .conv-avatar {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        flex-shrink: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 18px;
        color: #fff;
        overflow: hidden;
      }
      .conv-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
      .conv-info { flex: 1; min-width: 0; }
      .conv-name-row {
        display: flex;
        align-items: baseline;
        gap: 6px;
        justify-content: space-between;
      }
      .conv-name { font-weight: 700; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }
      .conv-ts { font-size: 12px; color: var(--text-soft); white-space: nowrap; flex-shrink: 0; }
      .conv-handle { font-size: 12px; color: var(--text-soft); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .conv-preview { font-size: 13px; color: var(--text-muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

      /* empty state */
      .inbox-empty {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 60px 24px;
        text-align: center;
        color: var(--text-soft);
        gap: 12px;
      }
      .inbox-empty svg { width: 48px; height: 48px; stroke: var(--border-strong); fill: none; stroke-width: 1.5; }
      .inbox-empty-title { font-size: 18px; font-weight: 700; color: var(--text); margin: 0; }
      .inbox-empty-sub { font-size: 14px; margin: 0; }

      /* Compose FAB */
      .compose-fab {
        position: fixed;
        right: 20px;
        bottom: calc(var(--sticky-footer-height) + 14px);
        width: 56px;
        height: 56px;
        border: 0;
        border-radius: 50%;
        background: var(--accent);
        color: #fff;
        box-shadow: 0 4px 16px rgba(0,0,0,0.22);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        z-index: 30;
      }
      .compose-fab:hover { background: #b01c1c; }
      .compose-fab svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }

      /* ── THREAD view ────────────────────────────────────────────── */
      #thread-view {
        display: none;
        flex-direction: column;
        height: 100dvh;
        overflow: hidden;
        background: var(--bg);
        padding-bottom: calc(var(--sticky-footer-height) + env(safe-area-inset-bottom, 0px));
      }
      .dm-messages {
        flex: 1;
        overflow-y: auto;
        padding: 14px 16px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        max-width: 660px;
        width: 100%;
        margin: 0 auto;
      }
      .dm-bubble-wrap {
        display: flex;
        flex-direction: column;
      }
      .dm-bubble {
        max-width: 76%;
        padding: 10px 14px;
        border-radius: 18px;
        font-size: 14px;
        line-height: 1.5;
        word-break: break-word;
      }
      .dm-bubble-out { align-self: flex-end; background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
      .dm-bubble-in  { align-self: flex-start; background: var(--surface); color: var(--text); border-bottom-left-radius: 4px; }
      .dm-bubble-text { white-space: pre-wrap; }
      .dm-bubble-attachment {
        margin-top: 8px;
        border-radius: 10px;
        overflow: hidden;
      }
      .dm-bubble-attachment img,
      .dm-bubble-attachment video {
        width: 100%;
        max-width: min(260px, 68vw);
        max-height: 320px;
        object-fit: cover;
        border-radius: 10px;
        display: block;
      }
      .dm-bubble-attachment-file {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        max-width: min(260px, 68vw);
        padding: 8px 10px;
        border-radius: 10px;
        text-decoration: none;
        font-size: 13px;
      }
      .dm-bubble-in .dm-bubble-attachment-file {
        background: #e9edf2;
        color: #1a1f2b;
      }
      .dm-bubble-out .dm-bubble-attachment-file {
        background: rgba(255,255,255,0.2);
        color: #fff;
      }
      .dm-bubble-meta { font-size: 11px; color: var(--text-soft); margin-top: 3px; }
      .dm-bubble-wrap.out .dm-bubble-meta { text-align: right; }

      /* thread empty */
      .dm-empty {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        flex: 1;
        gap: 10px;
        color: var(--text-soft);
        font-size: 14px;
        text-align: center;
        padding: 24px;
      }
      .dm-empty svg { width: 48px; height: 48px; stroke: var(--border-strong); fill: none; stroke-width: 1.5; }

      /* composer */
      .dm-composer {
        border-top: 1px solid var(--border);
        background: var(--bg);
        padding: 8px 12px calc(8px + env(safe-area-inset-bottom, 0px));
        display: flex;
        align-items: flex-end;
        gap: 8px;
        flex-shrink: 0;
        max-width: 660px;
        width: 100%;
        margin: 0 auto;
      }
      .dm-attach-btn {
        background: none;
        border: none;
        color: var(--text-soft);
        cursor: pointer;
        padding: 6px;
        border-radius: 6px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .dm-attach-btn:hover { color: var(--accent); }
      .dm-attach-btn svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
      .dm-attachment-preview {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 6px 10px;
        display: flex;
        align-items: center;
        gap: 8px;
        flex-shrink: 1;
        min-width: 0;
        max-width: 210px;
        background: var(--surface);
      }
      .dm-attachment-preview-name {
        font-size: 12px;
        color: var(--text-soft);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .dm-attachment-preview-clear {
        border: none;
        background: none;
        color: var(--text-soft);
        cursor: pointer;
        font-size: 16px;
        line-height: 1;
        padding: 0;
        flex-shrink: 0;
      }
      .dm-attachment-preview-clear:hover { color: var(--accent); }
      .dm-input {
        flex: 1;
        border: 1px solid var(--border-strong);
        border-radius: 20px;
        padding: 9px 14px;
        font-family: inherit;
        font-size: 14px;
        resize: none;
        background: var(--surface);
        color: var(--text);
        min-height: 40px;
        max-height: 120px;
        overflow-y: auto;
        line-height: 1.4;
      }
      .dm-input:focus { outline: 2px solid var(--focus); border-color: var(--focus); background: #fff; }
      .dm-send-btn {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: var(--accent);
        border: none;
        color: #fff;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        padding: 0;
      }
      .dm-send-btn:hover { background: #b01c1c; }
      .dm-send-btn:disabled { opacity: 0.45; cursor: default; }
      .dm-send-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }

      /* auth notice */
      .dm-auth-notice {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        color: var(--text-soft);
        font-size: 14px;
        text-align: center;
        padding: 24px;
      }
      .dm-auth-btn {
        border: 1px solid var(--accent);
        background: none;
        color: var(--accent);
        font-family: inherit;
        font-size: 14px;
        font-weight: 600;
        padding: 8px 22px;
        border-radius: 20px;
        cursor: pointer;
      }
      .dm-auth-btn:hover { background: var(--accent); color: #fff; }

      /* ── Sticky footer (matches rest of site) ──────────────────── */
      .sticky-footer {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 90;
        height: var(--sticky-footer-height);
        background: #ffffff;
        border-top: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-around;
        padding: 0 var(--sticky-footer-padding-x);
      }
      .sticky-footer-item {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: var(--text-soft);
        width: 44px;
        height: 44px;
        background: none;
        border: none;
        cursor: pointer;
        padding: 0;
        text-decoration: none;
      }
      .sticky-footer-item:hover,
      .sticky-footer-item.active {
        color: var(--accent);
      }
      .sticky-footer-item svg {
        width: 24px;
        height: 24px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2.5;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      /* ── Compose modal overlay ──────────────────────────────────── */
      .compose-modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.45);
        z-index: 200;
        display: flex;
        align-items: flex-end;
        justify-content: center;
      }
      .compose-modal {
        background: var(--bg);
        border-radius: 16px 16px 0 0;
        width: 100%;
        max-width: 540px;
        max-height: 80dvh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .compose-modal-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 18px 12px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }
      .compose-modal-title {
        font-size: 16px;
        font-weight: 700;
        margin: 0;
      }
      .compose-modal-close {
        background: none;
        border: none;
        font-size: 20px;
        line-height: 1;
        color: var(--text-muted);
        cursor: pointer;
        padding: 4px;
        border-radius: 50%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 30px;
        height: 30px;
      }
      .compose-modal-close:hover { background: var(--surface-soft); }
      .compose-search-wrap {
        padding: 10px 14px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }
      .compose-search {
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--surface);
        border-radius: 20px;
        padding: 8px 14px;
      }
      .compose-search svg { flex-shrink: 0; width: 16px; height: 16px; stroke: var(--text-placeholder); fill: none; stroke-width: 2.2; }
      .compose-search input {
        border: none;
        background: none;
        outline: none;
        font-family: inherit;
        font-size: 14px;
        color: var(--text);
        width: 100%;
      }
      .compose-search input::placeholder { color: var(--text-placeholder); }
      .compose-user-list {
        overflow-y: auto;
        flex: 1;
      }
      .compose-user-row {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 18px;
        cursor: pointer;
        border-bottom: 1px solid var(--border);
      }
      .compose-user-row:hover { background: var(--surface-soft); }
      .compose-user-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: #93a2b7;
        color: #fff;
        font-weight: 700;
        font-size: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        overflow: hidden;
      }
      .compose-user-avatar img { width: 100%; height: 100%; object-fit: cover; }
      .compose-user-info { min-width: 0; }
      .compose-user-name { font-size: 14px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .compose-user-handle { font-size: 12px; color: var(--text-soft); }
      .compose-empty {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px 18px;
        font-size: 14px;
        color: var(--text-soft);
      }
    </style>
  </head>
  <body>

    <!-- ═══════════════ INBOX VIEW ═══════════════ -->
    <div id="inbox-view">
      <header class="msg-header" id="inbox-header">
        <div class="msg-header-left">
          <button id="inbox-avatar-btn" class="avatar-chip" type="button" aria-label="Your profile">
            <img id="inbox-avatar-img" alt="" hidden />
            <span id="inbox-avatar-initials">?</span>
          </button>
        </div>
        <div class="msg-header-center">Messages</div>
        <div class="msg-header-right">
          <button id="inbox-settings-btn" class="msg-icon-btn" type="button" aria-label="Message settings" title="Settings">
            <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </button>
        </div>
      </header>

      <div class="inbox-search-wrap">
        <label class="inbox-search" for="inbox-search-input">
          <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input id="inbox-search-input" type="search" placeholder="Search Messages..." autocomplete="off" />
        </label>
      </div>

      <div id="conv-list" class="conv-list" role="list" aria-label="Conversations"></div>

      <div id="inbox-empty" class="inbox-empty" hidden>
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <p class="inbox-empty-title">No messages yet</p>
        <p id="inbox-empty-sub" class="inbox-empty-sub">Start a conversation from a user's profile</p>
      </div>
    </div>

    <button class="compose-fab" id="compose-fab" type="button" aria-label="Compose new message">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h11"/><line x1="18" y1="3" x2="18" y2="11"/><line x1="14" y1="7" x2="22" y2="7"/></svg>
    </button>

    <!-- ═══════════════ THREAD VIEW ═══════════════ -->
    <div id="thread-view">
      <header class="msg-header" id="thread-header">
        <div class="msg-header-left">
          <button id="thread-back-btn" class="msg-icon-btn" type="button" aria-label="Back to inbox">
            <svg viewBox="0 0 24 24" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <div id="thread-header-avatar" class="avatar-chip avatar-chip-static" aria-hidden="true">?</div>
        </div>
        <div class="msg-header-center thread-header-center">
          <div>
            <div id="thread-header-name" class="thread-user-name">Direct Message</div>
            <div id="thread-header-handle" class="thread-user-handle"></div>
          </div>
        </div>
        <div class="msg-header-right">
          <button id="thread-info-btn" class="msg-icon-btn" type="button" aria-label="Conversation info">
            <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          </button>
        </div>
      </header>

      <div id="dm-messages" class="dm-messages" role="log" aria-live="polite" aria-label="Message thread">
        <div id="dm-thread-empty" class="dm-empty">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <p>No messages yet. Say hello!</p>
        </div>
      </div>

      <div id="dm-composer" class="dm-composer">
        <button id="dm-attach-btn" class="dm-attach-btn" type="button" aria-label="Attach file" title="Attach">

    <!-- ═══════════════ COMPOSE MODAL ══════════════════════════════ -->
    <div id="compose-modal-overlay" class="compose-modal-overlay" hidden aria-modal="true" role="dialog" aria-labelledby="compose-modal-title">

    <script src="app.js"></script>
    <script>
      (function () {
        /* ── Constants ─────────────────────────────────────────────── */
        var DB_NAME = 'zorexium-app-db';
        var DB_VERSION = 4;
        var ACCOUNTS_STORE = 'accounts';
        var MEDIA_STORE    = 'media';
        var SESSION_STORE  = 'session';
        var MESSAGES_STORE = 'messages';
        var WINDOW_SESSION_PREFIX = 'zorexium-session:';
        var MSG_EMPTY_DEFAULT = 'Start a conversation from a user\'s profile';

        /* ── DOM refs ──────────────────────────────────────────────── */
        var inboxView      = document.getElementById('inbox-view');
        var threadView     = document.getElementById('thread-view');
        var inboxAvatarBtn = document.getElementById('inbox-avatar-btn');
        var inboxAvatarImg = document.getElementById('inbox-avatar-img');
        var inboxInitials  = document.getElementById('inbox-avatar-initials');
        var settingsBtn    = document.getElementById('inbox-settings-btn');
        var searchInput    = document.getElementById('inbox-search-input');
        var convList       = document.getElementById('conv-list');
        var inboxEmpty     = document.getElementById('inbox-empty');
        var inboxEmptySub  = document.getElementById('inbox-empty-sub');
        var composeFab     = document.getElementById('compose-fab');
        var composeOverlay = document.getElementById('compose-modal-overlay');
        var composeClose   = document.getElementById('compose-modal-close');
        var composeSearch  = document.getElementById('compose-user-search');
        var composeList    = document.getElementById('compose-user-list');

        var threadHeaderAvatar = document.getElementById('thread-header-avatar');
        var threadHeaderName   = document.getElementById('thread-header-name');
        var threadHeaderHandle = document.getElementById('thread-header-handle');
        var threadBackBtn      = document.getElementById('thread-back-btn');
        var threadInfoBtn      = document.getElementById('thread-info-btn');
        var messagesEl         = document.getElementById('dm-messages');
        var threadEmptyEl      = document.getElementById('dm-thread-empty');
        var attachBtn          = document.getElementById('dm-attach-btn');
        var attachInput        = document.getElementById('dm-attach-input');
        var attachmentPreview  = document.getElementById('dm-attachment-preview');
        var attachmentNameEl   = document.getElementById('dm-attachment-name');
        var attachmentClearBtn = document.getElementById('dm-attachment-clear');
        var inputEl            = document.getElementById('dm-input');
        var sendBtn            = document.getElementById('dm-send');

        /* ── State ─────────────────────────────────────────────────── */
        var currentUser      = null;
        var otherUser        = null;
        var conversationId   = '';
        var allConversations = [];
        var allAccounts      = [];
        var pollIntervalId   = null;
        var dmWs             = null;
        var serverDown       = false;
        var lastMsgCount     = 0;
        var appDbPromise     = null;
        var pendingAttachment = null;

        /* ── IndexedDB helpers ─────────────────────────────────────── */
        function openDb() {
          if (appDbPromise) return appDbPromise;
          appDbPromise = new Promise(function (res, rej) {
            var req = window.indexedDB.open(DB_NAME, DB_VERSION);
            req.onsuccess = function () { res(req.result); };
            req.onerror   = function () { rej(req.error); };
          });
          return appDbPromise;
        }
        function getLocal(store, key) {
          return openDb().then(function (db) {
            return new Promise(function (res) {
              var req = db.transaction(store, 'readonly').objectStore(store).get(key);
              req.onsuccess = function () { res(req.result || null); };
              req.onerror   = function () { res(null); };
            });
          });
        }
        function getAllLocal(store) {
          return openDb().then(function (db) {
            return new Promise(function (res) {
              var req = db.transaction(store, 'readonly').objectStore(store).getAll();
              req.onsuccess = function () { res(req.result || []); };
              req.onerror   = function () { res([]); };
            });
          });
        }

        /* ── Session helpers ───────────────────────────────────────── */
        function getWindowSession() {
          if (!window.name || window.name.indexOf(WINDOW_SESSION_PREFIX) !== 0) return null;
          try {
            var p = JSON.parse(window.name.slice(WINDOW_SESSION_PREFIX.length));
            return (p && p.userId) ? p : null;
          } catch (e) {
            return null;
          }
        }
        function getUserSession() {
          var ws = getWindowSession();
          if (ws) return Promise.resolve(ws);
          return getLocal(SESSION_STORE, 'current').then(function (s) {
            return (s && s.userId) ? s : null;
          });
        }

        /* ── Utility ───────────────────────────────────────────────── */
        function getParam(name) {
          return new URLSearchParams(window.location.search).get(name) || '';
        }
        function buildConvId(a, b) {
          return [a, b].sort().join(':');
        }
        function getInitials(name, username) {
          var n = String(name || username || '').trim();
          var parts = n.split(/\s+/);
          if (parts.length >= 2) return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
          return n.slice(0, 2).toUpperCase() || '?';
        }
        function getAvatarColor(seed) {
          var colors = ['#e02020','#1e88e5','#43a047','#fb8c00','#8e24aa','#00acc1','#d81b60','#546e7a'];
          var hash = 0; var s = String(seed || '');
          for (var i = 0; i < s.length; i++) { hash = (hash * 31 + s.charCodeAt(i)) & 0xffffffff; }
          return colors[Math.abs(hash) % colors.length];
        }
        function formatTs(ts) {
          if (!ts) return '';
          var d = new Date(ts);
          var now = new Date();
          var diffMs = now - d;
          if (diffMs < 60000) return 'just now';
          if (diffMs < 3600000) return Math.floor(diffMs / 60000) + 'm';
          if (diffMs < 86400000) return Math.floor(diffMs / 3600000) + 'h';
          if (diffMs < 604800000) return Math.floor(diffMs / 86400000) + 'd';
          return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
        }
        function formatTime(ts) {
          try { return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); } catch (e) { return ''; }
        }
        function getMessagePreviewText(msg) {
          if (!msg || typeof msg !== 'object') return '';
          var text = String(msg.text || '').trim();
          if (text) return text.slice(0, 80);
          if (msg.attachment && msg.attachment.name) return '[Attachment] ' + String(msg.attachment.name).slice(0, 64);
          return '';
        }
        function inferMimeTypeFromName(name) {
          var fileName = String(name || '').toLowerCase();
          if (fileName.endsWith('.pdf')) return 'application/pdf';
          if (fileName.endsWith('.txt')) return 'text/plain';
          if (fileName.endsWith('.doc')) return 'application/msword';
          if (fileName.endsWith('.docx')) return 'application/vnd.openxmlformats-officedocument.wordprocessingml.document';
          if (fileName.endsWith('.png')) return 'image/png';
          if (fileName.endsWith('.jpg') || fileName.endsWith('.jpeg')) return 'image/jpeg';
          if (fileName.endsWith('.gif')) return 'image/gif';
          if (fileName.endsWith('.webp')) return 'image/webp';
          if (fileName.endsWith('.mp4')) return 'video/mp4';
          if (fileName.endsWith('.mov')) return 'video/quicktime';
          if (fileName.endsWith('.webm')) return 'video/webm';
          return 'application/octet-stream';
        }
        function blobToDataUrl(blob) {
          return new Promise(function (resolve) {
            if (!(blob instanceof Blob)) { resolve(''); return; }
            var reader = new FileReader();
            reader.onload = function () { resolve(typeof reader.result === 'string' ? reader.result : ''); };
            reader.onerror = function () { resolve(''); };
            reader.readAsDataURL(blob);
          });
        }
        function mediaRecordToBlob(record) {
          if (!record || typeof record !== 'object') return null;
          if (record.data instanceof ArrayBuffer) return new Blob([record.data], { type: record.type || 'application/octet-stream' });
          if (record.data instanceof Blob) return record.data;
          if (record.blob instanceof Blob) return record.blob;
          if (record.file instanceof Blob) return record.file;
          return null;
        }
        function resolveUserAvatarUrl(user) {
          if (!user) return Promise.resolve('');
          var cached = String(user.__avatarUrl || '').trim();
          if (cached) return Promise.resolve(cached);
          var legacy = String(user.profilePictureDataUrl || '').trim();
          if (legacy) {
            user.__avatarUrl = legacy;
            return Promise.resolve(legacy);
          }
          var mediaId = String(user.profileImageMediaId || '').trim();
          if (!mediaId) return Promise.resolve('');
          return getLocal(MEDIA_STORE, mediaId).then(function (record) {
            var blob = mediaRecordToBlob(record);
            if (!blob) return '';
            return blobToDataUrl(blob);
          }).then(function (url) {
            user.__avatarUrl = url || '';
            return user.__avatarUrl;
          }).catch(function () {
            return '';
          });
        }
        function hydrateAccountsAvatarUrls(accounts) {
          var list = Array.isArray(accounts) ? accounts : [];
          return Promise.all(list.map(function (user) { return resolveUserAvatarUrl(user); })).then(function () { return list; });
        }
        function lookupById(id, accounts) {
          for (var i = 0; i < accounts.length; i++) { if (accounts[i].id === id) return accounts[i]; }
          return null;
        }

        /* ── Server helpers ────────────────────────────────────────── */
        function apiFetch(method, store, key, body) {
          if (serverDown) return Promise.reject(new Error('server down'));
          var url = '/api/store/' + encodeURIComponent(store) + (key ? '/' + encodeURIComponent(key) : '');
          var opts = { method: method };
          if (body !== undefined) {
            opts.headers = { 'Content-Type': 'application/json' };
            opts.body = JSON.stringify({ record: body });
          }
          return fetch(url, opts).then(function (r) {
            if (!r.ok) throw new Error('Server ' + r.status);
            return r.json();
          }).catch(function (err) { serverDown = true; throw err; });
        }
        function loadConversation() {
          return apiFetch('GET', MESSAGES_STORE, conversationId)
            .then(function (d) { return d && d.record ? d.record : null; })
            .catch(function () { return null; });
        }
        function saveConversation(record) {
          return apiFetch('PUT', MESSAGES_STORE, conversationId, record)
            .catch(function (e) { console.warn('save conv failed', e); });
        }
        function incrementField(store, key, field, by) {
          return fetch('/api/store/' + encodeURIComponent(store) + '/' + encodeURIComponent(key) + '/increment', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ field: field, by: by })
          }).catch(function () {});
        }
        function resetUnread() {
          if (!currentUser || serverDown) return;
          var url = '/api/store/accounts/' + encodeURIComponent(currentUser.id);
          fetch(url).then(function (r) { return r.ok ? r.json() : null; }).then(function (d) {
            if (!d || !d.record) return;
            return fetch(url, { method: 'PUT', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ record: Object.assign({}, d.record, { unreadDmCount: 0 }) }) });
          }).catch(function () {});
        }
        function loadAccountsFromServer() {
          return fetch('/api/store/accounts').then(function (r) { return r.ok ? r.json() : null; })
            .then(function (d) { return (d && Array.isArray(d.records) && d.records.length) ? d.records : getAllLocal(ACCOUNTS_STORE); })
            .catch(function () { return getAllLocal(ACCOUNTS_STORE); });
        }
        function loadAllConversations() {
          return fetch('/api/store/' + MESSAGES_STORE).then(function (r) { return r.ok ? r.json() : null; })
            .then(function (d) { return (d && Array.isArray(d.records)) ? d.records : []; })
            .catch(function () { return []; });
        }

        /* ── Avatar rendering ──────────────────────────────────────── */
        function setAvatar(el, user) {
          if (!user) {
            el.textContent = '';
            el.style.background = '#93a2b7';
            el.setAttribute('aria-label', 'No profile image available');
            return;
          }
          var displayName = String(user.name || user.username || 'User').trim() || 'User';
          el.setAttribute('aria-label', 'Profile avatar for ' + displayName);
          el.style.background = getAvatarColor(user.username || user.id);
          var avatarSrc = String(user.__avatarUrl || user.profilePictureDataUrl || '').trim();
          var img = el.querySelector('img');
          var span = el.querySelector('span');
          if (!img && avatarSrc) {
            img = document.createElement('img');
            img.alt = '';
            el.textContent = '';
            el.appendChild(img);
          }
          if (img && avatarSrc) {
            img.src = avatarSrc;
            img.hidden = false;
            if (span) span.hidden = true;
          } else if (img) {
            img.remove();
            if (span) span.hidden = false;
            img = null;
          }
          if (!img) {
            var textTarget = span || el;
            textTarget.textContent = getInitials(user.name, user.username);
          }
        }

        /* ── Inbox ─────────────────────────────────────────────────── */
        function renderInbox(conversations, accounts, filterText) {
          var uid = currentUser ? currentUser.id : '';
          var rows = conversations.filter(function (c) {
            if (!c || !c.id) return false;
            var parts = String(c.id).split(':');
            return parts.indexOf(uid) !== -1;
          });

          rows.sort(function (a, b) { return (b.updatedAt || 0) - (a.updatedAt || 0); });

          if (filterText) {
            var q = filterText.toLowerCase();
            rows = rows.filter(function (c) {
              var otherId = getOtherParticipantId(c, uid);
              var other = lookupById(otherId, accounts);
              if (!other) return false;
              var name = String(other.name || other.username || '').toLowerCase();
              var handle = String(other.username || '').toLowerCase();
              return name.indexOf(q) !== -1 || handle.indexOf(q) !== -1;
            });
          }

          convList.innerHTML = '';
          if (!rows.length) {
            inboxEmpty.hidden = false;
            if (!filterText && !uid) {
              inboxEmptySub.textContent = 'Sign in to see your messages';
            } else if (filterText) {
              inboxEmptySub.textContent = 'No conversations match your search';
            } else {
              inboxEmptySub.textContent = MSG_EMPTY_DEFAULT;
            }
            return;
          }
          inboxEmpty.hidden = true;

          rows.forEach(function (conv) {
            var otherId = getOtherParticipantId(conv, uid);
            var other = lookupById(otherId, accounts);
            var msgs = Array.isArray(conv.messages) ? conv.messages : [];
            var lastMsg = msgs.length ? msgs[msgs.length - 1] : null;
            var preview = lastMsg ? getMessagePreviewText(lastMsg) : '';

            var row = document.createElement('div');
            row.className = 'conv-row';
            row.setAttribute('role', 'listitem');
            row.setAttribute('tabindex', '0');
            row.setAttribute('aria-label', 'Conversation with ' + (other ? (other.name || other.username || 'User') : 'User'));

            var avatarEl = document.createElement('div');
            avatarEl.className = 'conv-avatar';
            setAvatar(avatarEl, other);

            var infoEl = document.createElement('div');
            infoEl.className = 'conv-info';

            var nameRow = document.createElement('div');
            nameRow.className = 'conv-name-row';
            var nameEl = document.createElement('span');
            nameEl.className = 'conv-name';
            nameEl.textContent = other ? (other.name || other.username || 'User') : (otherId || 'User');
            var tsEl = document.createElement('span');
            tsEl.className = 'conv-ts';
            tsEl.textContent = formatTs(conv.updatedAt || (lastMsg ? lastMsg.createdAt : 0));
            nameRow.appendChild(nameEl);
            nameRow.appendChild(tsEl);

            var handleEl = document.createElement('div');
            handleEl.className = 'conv-handle';
            handleEl.textContent = other && other.username ? '@' + other.username : '';

            var previewEl = document.createElement('div');
            previewEl.className = 'conv-preview';
            if (preview) {
              var isOwn = lastMsg && lastMsg.senderId === uid;
              previewEl.textContent = (isOwn ? 'You: ' : '') + preview;
            } else {
              previewEl.textContent = 'Start the conversation';
              previewEl.style.color = 'var(--text-placeholder)';
            }

            infoEl.appendChild(nameRow);
            infoEl.appendChild(handleEl);
            infoEl.appendChild(previewEl);

            row.appendChild(avatarEl);
            row.appendChild(infoEl);

            (function (convRecord) {
              function openConv() {
                var oid = getOtherParticipantId(convRecord, uid);
                window.location.href = 'messages.html?with=' + encodeURIComponent(oid);
              }
              row.addEventListener('click', openConv);
              row.addEventListener('keydown', function (e) { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openConv(); } });
            }(conv));

            convList.appendChild(row);
          });
        }

        function getOtherParticipantId(conv, myId) {
          if (!conv) return '';
          var parts = Array.isArray(conv.participants) ? conv.participants : String(conv.id || '').split(':');
          for (var i = 0; i < parts.length; i++) { if (parts[i] !== myId) return parts[i]; }
          return parts[0] || '';
        }

        function initInbox(session, accounts) {
          threadView.style.display = 'none';
          inboxView.style.display = '';
          composeFab.style.display = '';
          document.title = 'Messages';

          allAccounts = accounts;
          currentUser = session ? lookupById(session.userId, accounts) : null;

          // set inbox header avatar
          if (currentUser) {
            setAvatar(inboxAvatarBtn, currentUser);
          }

          inboxAvatarBtn.addEventListener('click', function () {
            window.location.href = currentUser ? 'account-dashboard.html' : 'index.html';
          });
          settingsBtn.addEventListener('click', function () { /* settings placeholder */ });
          composeFab.addEventListener('click', function () {
            if (!currentUser) { window.location.href = 'index.html'; return; }
            openComposeModal();
          });

          loadAllConversations().then(function (convs) {
            allConversations = convs;
            renderInbox(convs, accounts, '');
          });

          searchInput.addEventListener('input', function () {
            renderInbox(allConversations, allAccounts, String(searchInput.value || '').trim());
          });
        }

        /* ── Thread ─────────────────────────────────────────────────── */
        function renderMessages(record) {
          var messages = (record && Array.isArray(record.messages)) ? record.messages : [];
          messagesEl.querySelectorAll('.dm-bubble-wrap').forEach(function (el) { el.remove(); });
          threadEmptyEl.style.display = messages.length ? 'none' : '';
          messages.forEach(function (msg) { appendBubble(msg); });
          messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function appendBubble(msg) {
          var isOwn = currentUser && msg.senderId === currentUser.id;
          var wrap = document.createElement('div');
          wrap.className = 'dm-bubble-wrap' + (isOwn ? ' out' : '');

          var bubble = document.createElement('div');
          bubble.className = 'dm-bubble ' + (isOwn ? 'dm-bubble-out' : 'dm-bubble-in');
          var textValue = String((msg && msg.text) || '').trim();
          if (textValue) {
            var textNode = document.createElement('div');
            textNode.className = 'dm-bubble-text';
            textNode.textContent = textValue;
            bubble.appendChild(textNode);
          }
          if (msg && msg.attachment && msg.attachment.dataUrl) {
            var attachmentWrap = document.createElement('div');
            attachmentWrap.className = 'dm-bubble-attachment';
            var attachmentType = String(msg.attachment.type || '').toLowerCase();
            if (attachmentType.indexOf('image/') === 0) {
              var img = document.createElement('img');
              img.src = msg.attachment.dataUrl;
              img.alt = msg.attachment.name ? ('Image attachment: ' + msg.attachment.name) : 'Image attachment';
              attachmentWrap.appendChild(img);
            } else if (attachmentType.indexOf('video/') === 0) {
              var vid = document.createElement('video');
              vid.src = msg.attachment.dataUrl;
              vid.controls = true;
              vid.preload = 'metadata';
              vid.setAttribute('aria-label', msg.attachment.name ? ('Video attachment: ' + msg.attachment.name) : 'Video attachment');
              attachmentWrap.appendChild(vid);
            } else {
              var fileLink = document.createElement('a');
              fileLink.className = 'dm-bubble-attachment-file';
              fileLink.href = msg.attachment.dataUrl;
              fileLink.target = '_blank';
              fileLink.rel = 'noopener noreferrer';
              fileLink.download = msg.attachment.name || 'attachment';
              fileLink.textContent = '📎 ' + (msg.attachment.name || 'Attachment');
              attachmentWrap.appendChild(fileLink);
            }
            bubble.appendChild(attachmentWrap);
          }

          var meta = document.createElement('div');
          meta.className = 'dm-bubble-meta';
          meta.textContent = formatTime(msg.createdAt);

          wrap.appendChild(bubble);
          wrap.appendChild(meta);
          messagesEl.insertBefore(wrap, threadEmptyEl);
        }

        function sendMessage() {
          var text = (inputEl.value || '').trim();
          if ((!text && !pendingAttachment) || !currentUser || !conversationId) return;
          inputEl.value = '';
          sendBtn.disabled = true;
          inputEl.style.height = 'auto';
          var attachment = pendingAttachment ? {
            name: pendingAttachment.name,
            type: pendingAttachment.type,
            size: pendingAttachment.size,
            dataUrl: pendingAttachment.dataUrl
          } : null;
          setPendingAttachment(null);
          updateSendBtn();

          var msg = {
            id: Date.now() + '-' + Math.random().toString(36).slice(2),
            senderId: currentUser.id,
            text: text,
            attachment: attachment,
            createdAt: Date.now()
          };

          threadEmptyEl.style.display = 'none';
          appendBubble(msg);
          messagesEl.scrollTop = messagesEl.scrollHeight;

          loadConversation().then(function (record) {
            var existing = (record && Array.isArray(record.messages)) ? record.messages : [];
            existing.push(msg);
            return saveConversation({
              id: conversationId,
              participants: [currentUser.id, otherUser ? otherUser.id : ''],
              messages: existing,
              updatedAt: Date.now()
            });
          }).then(function () {
            if (otherUser && otherUser.id) {
              incrementField('accounts', otherUser.id, 'unreadDmCount', 1);
            }
          }).catch(function (e) { console.warn('send failed', e); })
            .finally(function () { sendBtn.disabled = false; });
        }

        function pollMessages() {
          loadConversation().then(function (record) {
            var msgs = (record && Array.isArray(record.messages)) ? record.messages : [];
            if (msgs.length !== lastMsgCount) {
              lastMsgCount = msgs.length;
              renderMessages(record);
            }
          }).catch(function () {});
        }

        function connectWs() {
          if (!conversationId) return;
          try {
            var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
            dmWs = new WebSocket(proto + '//' + location.host + '/ws?conv=' + encodeURIComponent(conversationId));
            dmWs.onmessage = function (ev) {
              try {
                var d = JSON.parse(ev.data);
                if (d && d.type === 'dm-update' && d.conversationId === conversationId) {
                  pollMessages();
                }
              } catch (e) {
                // malformed ws message — ignore
              }
            };
            dmWs.onclose = function () {
              dmWs = null;
              if (!pollIntervalId) {
                pollIntervalId = setInterval(pollMessages, 10000);
              }
            };
          } catch (e) {
            if (!pollIntervalId) {
              pollIntervalId = setInterval(pollMessages, 10000);
            }
          }
        }

        function setPendingAttachment(attachment) {
          pendingAttachment = attachment || null;
          if (pendingAttachment) {
            attachmentNameEl.textContent = pendingAttachment.name || 'Attachment';
            attachmentPreview.hidden = false;
          } else {
            attachmentNameEl.textContent = '';
            attachmentPreview.hidden = true;
          }
        }
        function updateSendBtn() {
          sendBtn.disabled = !((inputEl.value || '').trim() || pendingAttachment);
        }
        function handleAttachmentSelection(file) {
          if (!(file instanceof File)) {
            console.warn('DM attachment selection skipped: invalid file input');
            return;
          }
          blobToDataUrl(file).then(function (dataUrl) {
            if (!dataUrl) return;
            setPendingAttachment({
              name: file.name || 'attachment',
              type: file.type || inferMimeTypeFromName(file.name),
              size: file.size || 0,
              dataUrl: dataUrl
            });
            updateSendBtn();
          });
        }

        function showAuthNotice() {
          var notice = document.createElement('div');
          notice.className = 'dm-auth-notice';
          var p = document.createElement('p'); p.textContent = 'Sign in to use Direct Messages.';
          var btn = document.createElement('button'); btn.className = 'dm-auth-btn'; btn.textContent = 'Go to home';
          btn.addEventListener('click', function () { window.location.href = 'index.html'; });
          notice.appendChild(p); notice.appendChild(btn);
          messagesEl.innerHTML = '';
          messagesEl.appendChild(notice);
          document.getElementById('dm-composer').style.display = 'none';
        }

        function initThread(session, accounts) {
          inboxView.style.display = 'none';
          composeFab.style.display = 'none';
          threadView.style.display = 'flex';

          if (!session) { showAuthNotice(); return; }

          currentUser = lookupById(session.userId, accounts);
          if (!currentUser) { showAuthNotice(); return; }

          var withId = getParam('with');
          otherUser = lookupById(withId, accounts);
          conversationId = buildConvId(session.userId, withId);

          document.title = 'Messages — ' + (otherUser ? (otherUser.name || otherUser.username) : 'Chat');

          // thread header
          threadHeaderName.textContent = otherUser ? (otherUser.name || otherUser.username || 'User') : 'User';
          threadHeaderHandle.textContent = otherUser && otherUser.username ? '@' + otherUser.username : '';
          if (otherUser) {
            setAvatar(threadHeaderAvatar, otherUser);
          }

          threadBackBtn.addEventListener('click', function () {
            if (document.referrer && document.referrer.indexOf(location.origin) === 0) {
              history.back();
            } else {
              window.location.href = 'messages.html';
            }
          });
          threadInfoBtn.addEventListener('click', function () {
            if (otherUser) window.location.href = 'account-dashboard.html?userId=' + encodeURIComponent(otherUser.id);
          });

          inputEl.addEventListener('input', function () {
            updateSendBtn();
            inputEl.style.height = 'auto';
            inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
          });
          inputEl.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!sendBtn.disabled) sendMessage(); }
          });
          sendBtn.addEventListener('click', sendMessage);
          attachBtn.addEventListener('click', function () { attachInput.click(); });
          attachInput.addEventListener('change', function () {
            var file = attachInput.files && attachInput.files[0] ? attachInput.files[0] : null;
            if (file) handleAttachmentSelection(file);
            attachInput.value = '';
          });
          attachmentClearBtn.addEventListener('click', function () {
            setPendingAttachment(null);
            updateSendBtn();
          });

          loadConversation().then(function (record) {
            lastMsgCount = (record && Array.isArray(record.messages)) ? record.messages.length : 0;
            renderMessages(record);
            resetUnread();
          });
          connectWs();
        }

        /* ── Compose modal ──────────────────────────────────────────── */
        function renderComposeUserList(filterText) {
          composeList.innerHTML = '';
          var uid = currentUser ? currentUser.id : '';
          var users = allAccounts.filter(function (a) {
            if (!a || !a.id || a.id === uid) return false;
            if (!filterText) return true;
            var q = filterText.toLowerCase();
            var name = String(a.name || a.username || '').toLowerCase();
            var handle = String(a.username || '').toLowerCase();
            return name.indexOf(q) !== -1 || handle.indexOf(q) !== -1;
          });

          if (!users.length) {
            var empty = document.createElement('div');
            empty.className = 'compose-empty';
            empty.textContent = filterText ? 'No users found' : 'No other users yet';
            composeList.appendChild(empty);
            return;
          }

          users.forEach(function (user) {
            var row = document.createElement('div');
            row.className = 'compose-user-row';
            row.setAttribute('role', 'listitem');
            row.setAttribute('tabindex', '0');
            row.setAttribute('aria-label', 'Message ' + (user.name || user.username || 'User'));

            var avatarEl = document.createElement('div');
            avatarEl.className = 'compose-user-avatar';
            setAvatar(avatarEl, user);

            var infoEl = document.createElement('div');
            infoEl.className = 'compose-user-info';
            var nameEl = document.createElement('div');
            nameEl.className = 'compose-user-name';
            nameEl.textContent = user.name || user.username || 'User';
            var handleEl = document.createElement('div');
            handleEl.className = 'compose-user-handle';
            handleEl.textContent = user.username ? '@' + user.username : '';
            infoEl.appendChild(nameEl);
            infoEl.appendChild(handleEl);

            row.appendChild(avatarEl);
            row.appendChild(infoEl);

            (function (u) {
              function openDm() {
                closeComposeModal();
                window.location.href = 'messages.html?with=' + encodeURIComponent(u.id);
              }
              row.addEventListener('click', openDm);
              row.addEventListener('keydown', function (e) { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openDm(); } });
            }(user));

            composeList.appendChild(row);
          });
        }

        function openComposeModal() {
          composeSearch.value = '';
          renderComposeUserList('');
          composeOverlay.hidden = false;
          composeSearch.focus();
        }

        function closeComposeModal() {
          composeOverlay.hidden = true;
        }

        composeClose.addEventListener('click', closeComposeModal);
        composeOverlay.addEventListener('click', function (e) {
          if (e.target === composeOverlay) closeComposeModal();
        });
        composeSearch.addEventListener('input', function () {
          renderComposeUserList(String(composeSearch.value || '').trim());
        });

        /* ── Sticky footer nav ──────────────────────────────────────── */
        var sfMarketplace   = document.getElementById('sticky-footer-marketplace');
        var sfProfile       = document.getElementById('sticky-footer-profile');
        if (sfMarketplace)   sfMarketplace.addEventListener('click', function () { window.location.href = 'marketplace.html'; });
        if (sfProfile)       sfProfile.addEventListener('click', function () { window.location.href = 'account-dashboard.html'; });

        /* ── Boot ───────────────────────────────────────────────────── */
        getUserSession().then(function (session) {
          return loadAccountsFromServer().then(function (accounts) {
            return hydrateAccountsAvatarUrls(accounts);
          }).then(function (accounts) {
            if (getParam('with')) {
              initThread(session, accounts);
            } else {
              initInbox(session, accounts);
            }
          });
        });

        window.addEventListener('beforeunload', function () {
          if (pollIntervalId) clearInterval(pollIntervalId);
          if (dmWs) { dmWs.onclose = null; dmWs.close(); }
        });
      }());
    </script>
  </body>
</html>
