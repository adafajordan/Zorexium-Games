<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Messages</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #f4f5f7;
        --surface: #ffffff;
        --surface-soft: #e7ebef;
        --text: #111827;
        --text-soft: #5b6b7a;
        --border: #d4dbe2;
        --accent: #1d9bf0;
        --accent-dark: #1786cc;
        --thread-accent: #cc2222;
        --sticky-footer-height: 78px;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100dvh;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        color: var(--text);
        background: var(--bg);
      }
      .page {
        min-height: 100dvh;
        padding-bottom: calc(var(--sticky-footer-height) + 18px);
      }

      /* Inbox layout */
      .messages-inbox {
        width: min(960px, 100%);
        margin: 0 auto;
        padding: 22px 18px 26px;
      }
      .inbox-top {
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: center;
        gap: 12px;
      }
      .profile-chip {
        width: 52px;
        height: 52px;
        border-radius: 50%;
        border: 0;
        padding: 0;
        position: relative;
        overflow: hidden;
        background: #93a2b7;
        color: #fff;
        font-weight: 700;
        font-size: 16px;
        cursor: pointer;
      }
      .profile-chip img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .profile-chip-dot {
        position: absolute;
        top: 1px;
        right: 1px;
        width: 12px;
        height: 12px;
        border-radius: 999px;
        background: var(--accent);
        border: 2px solid var(--bg);
      }
      .inbox-title {
        margin: 0;
        text-align: center;
        font-size: clamp(30px, 5vw, 44px);
        letter-spacing: -0.02em;
        font-weight: 700;
      }
      .inbox-filter {
        border: 2px solid #c8d0d8;
        border-radius: 999px;
        background: transparent;
        color: var(--text);
        min-width: 124px;
        padding: 12px 18px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        font-size: 18px;
        font-weight: 500;
        cursor: pointer;
      }
      .inbox-filter svg {
        width: 18px;
        height: 18px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2.25;
      }
      .inbox-search {
        margin-top: 22px;
        width: 100%;
        border: 0;
        border-radius: 999px;
        background: #dce1e6;
        color: #4e5f70;
        font-size: clamp(20px, 4vw, 58px);
        line-height: 1;
        padding: 18px 22px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .inbox-search svg {
        flex-shrink: 0;
        width: 1.05em;
        height: 1.05em;
        stroke: currentColor;
        fill: none;
        stroke-width: 2.2;
      }
      .inbox-search input {
        width: 100%;
        border: 0;
        outline: 0;
        background: transparent;
        color: inherit;
        font: inherit;
      }
      .inbox-search input::placeholder { color: #607282; opacity: 1; }
      .inbox-empty {
        margin-top: 26px;
        padding-left: 10px;
      }
      .inbox-empty-title {
        margin: 0 0 8px;
        font-size: clamp(34px, 5.2vw, 66px);
        line-height: 1.1;
      }
      .inbox-empty-subtitle {
        margin: 0;
        color: var(--text-soft);
        font-size: clamp(20px, 3.8vw, 46px);
        line-height: 1.32;
      }
      .compose-fab {
        position: fixed;
        right: 26px;
        bottom: calc(var(--sticky-footer-height) + 30px);
        width: clamp(72px, 13vw, 164px);
        height: clamp(72px, 13vw, 164px);
        border: 0;
        border-radius: 50%;
        background: var(--accent);
        color: #fff;
        box-shadow: 0 8px 26px rgba(0, 0, 0, 0.2);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }
      .compose-fab:hover { background: var(--accent-dark); }
      .compose-fab svg {
        width: 55%;
        height: 55%;
        stroke: currentColor;
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .bottom-nav {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        height: var(--sticky-footer-height);
        border-top: 1px solid var(--border);
        background: rgba(250, 251, 252, 0.96);
        backdrop-filter: blur(8px);
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        align-items: center;
        z-index: 40;
      }
      .bottom-nav-item {
        width: 100%;
        height: 100%;
        border: 0;
        background: none;
        color: #0f172a;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        position: relative;
        cursor: pointer;
      }
      .bottom-nav-item svg {
        width: clamp(24px, 5vw, 44px);
        height: clamp(24px, 5vw, 44px);
        stroke: currentColor;
        fill: none;
        stroke-width: 2.2;
      }
      .bottom-nav-item.active { color: #050f1e; }
      .bottom-nav-item.active svg { fill: currentColor; stroke: none; }
      .bottom-nav-dot {
        position: absolute;
        top: 11px;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: var(--accent);
      }

      /* Thread mode (existing DM thread) */
      .dm-thread {
        display: none;
        min-height: 100dvh;
        background: #fff;
      }
      .dm-header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 16px;
        background: rgba(255,255,255,0.97);
        border-bottom: 1px solid #e0e0e0;
        backdrop-filter: blur(6px);
        position: sticky;
        top: 0;
        z-index: 50;
        flex-shrink: 0;
      }
      .dm-back-btn {
        background: none;
        border: none;
        padding: 4px 8px;
        cursor: pointer;
        border-radius: 6px;
        color: #111;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .dm-back-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
      .dm-header-avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        font-weight: 700;
        color: #fff;
        background: #8f9faf;
        flex-shrink: 0;
      }
      .dm-header-info { min-width: 0; flex: 1; }
      .dm-header-name { font-weight: 700; font-size: 15px; line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .dm-header-handle { font-size: 12px; color: #666; }
      .dm-messages {
        overflow-y: auto;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        max-width: 640px;
        width: 100%;
        margin: 0 auto;
        height: calc(100dvh - 122px);
      }
      .dm-bubble {
        max-width: 75%;
        padding: 10px 14px;
        border-radius: 18px;
        font-size: 14px;
        line-height: 1.5;
        word-break: break-word;
      }
      .dm-bubble-out { align-self: flex-end; background: var(--thread-accent); color: #fff; border-bottom-right-radius: 4px; }
      .dm-bubble-in { align-self: flex-start; background: #f5f5f5; color: #111; border-bottom-left-radius: 4px; }
      .dm-bubble-meta { font-size: 11px; color: #666; margin-top: 2px; text-align: right; }
      .dm-bubble-in .dm-bubble-meta { text-align: left; }
      .dm-empty {
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 8px;
        color: #666;
        font-size: 14px;
        text-align: center;
        padding: 24px;
      }
      .dm-empty-icon svg { width: 48px; height: 48px; stroke: #ccc; fill: none; stroke-width: 1.5; }
      .dm-composer {
        display: flex;
        align-items: flex-end;
        gap: 10px;
        padding: 10px 16px;
        border-top: 1px solid #e0e0e0;
        background: #fff;
        max-width: 640px;
        width: 100%;
        margin: 0 auto;
      }
      .dm-input {
        flex: 1;
        border: 1px solid #ccc;
        border-radius: 20px;
        padding: 10px 14px;
        font-family: inherit;
        font-size: 14px;
        resize: none;
        background: #f5f5f5;
        color: #111;
        min-height: 42px;
        max-height: 120px;
        overflow-y: auto;
        line-height: 1.4;
      }
      .dm-send-btn {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        background: var(--thread-accent);
        border: none;
        color: #fff;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0;
      }
      .dm-send-btn:disabled { opacity: 0.5; cursor: default; }
      .dm-send-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

      @media (max-width: 700px) {
        .messages-inbox {
          padding: 16px 12px 16px;
        }
        .inbox-filter {
          min-width: 96px;
          font-size: 16px;
          padding: 10px 14px;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <section class="messages-inbox" id="messages-inbox" aria-label="Messages inbox">
        <div class="inbox-top">
          <button id="inbox-profile-btn" class="profile-chip" type="button" aria-label="Profile">
            <img id="inbox-avatar-image" alt="" hidden />
            <span id="inbox-avatar-initials">?</span>
            <span class="profile-chip-dot" aria-hidden="true"></span>
          </button>
          <h1 class="inbox-title">Chat</h1>
          <button id="inbox-filter-btn" class="inbox-filter" type="button" aria-label="Filter chats">
            <span id="inbox-filter-label">All</span>
            <svg viewBox="0 0 24 24" aria-hidden="true"><polyline points="6 9 12 15 18 9" /></svg>
          </button>
        </div>

        <label class="inbox-search" for="inbox-search-input">
          <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7" /><line x1="21" y1="21" x2="16.65" y2="16.65" /></svg>
          <input id="inbox-search-input" type="search" placeholder="Search" autocomplete="off" />
        </label>

        <div class="inbox-empty" id="inbox-empty-state">
          <p class="inbox-empty-title">No chats yet</p>
          <p class="inbox-empty-subtitle" id="inbox-empty-subtitle">Start chatting with end-to-end encryption</p>
        </div>
      </section>

      <section class="dm-thread" id="dm-thread">
        <div class="dm-header" id="dm-header">
          <button class="dm-back-btn" id="dm-back" aria-label="Go back" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <div class="dm-header-avatar" id="dm-header-avatar">?</div>
          <div class="dm-header-info">
            <div class="dm-header-name" id="dm-header-name">Direct Message</div>
            <div class="dm-header-handle" id="dm-header-handle"></div>
          </div>
        </div>

        <div class="dm-messages" id="dm-messages">
          <div class="dm-empty" id="dm-empty" hidden>
            <div class="dm-empty-icon">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            </div>
            <p>No messages yet. Say hello!</p>
          </div>
        </div>

        <div class="dm-composer" id="dm-composer">
          <textarea class="dm-input" id="dm-input" placeholder="Type a message…" rows="1" aria-label="Message text"></textarea>
          <button class="dm-send-btn" id="dm-send" type="button" aria-label="Send" disabled>
            <svg viewBox="0 0 24 24" aria-hidden="true"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </section>
    </div>

    <button class="compose-fab" id="compose-fab" type="button" aria-label="Start a new message">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h11"/><line x1="18" y1="3" x2="18" y2="11"/><line x1="14" y1="7" x2="22" y2="7"/></svg>
    </button>

    <nav class="bottom-nav" aria-label="Primary">
      <button class="bottom-nav-item" type="button" data-nav-target="index.html" aria-label="Home">
        <span class="bottom-nav-dot" aria-hidden="true"></span>
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </button>
      <button class="bottom-nav-item" type="button" data-nav-target="search" aria-label="Search">
        <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
      <button class="bottom-nav-item" type="button" data-nav-target="articles.html" aria-label="Explore">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18.4 5.6A8.5 8.5 0 0 0 5.6 18.4"/><path d="M5.6 5.6A8.5 8.5 0 0 0 18.4 18.4"/><circle cx="12" cy="12" r="1.7"/></svg>
      </button>
      <button class="bottom-nav-item" type="button" data-nav-target="notifications.html" aria-label="Notifications">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      </button>
      <button class="bottom-nav-item active" type="button" data-nav-target="messages.html" aria-label="Messages">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </button>
    </nav>

    <script src="app.js"></script>
    <script>
      (function () {
        var DB_NAME = 'zorexium-app-db';
        var DB_VERSION = 4;
        var ACCOUNTS_STORE = 'accounts';
        var SESSION_STORE = 'session';
        var MESSAGES_SERVER_STORE = 'messages';
        var WINDOW_SESSION_PREFIX = 'zorexium-session:';

        var inboxView = document.getElementById('messages-inbox');
        var threadView = document.getElementById('dm-thread');
        var inboxProfileBtn = document.getElementById('inbox-profile-btn');
        var inboxAvatarImage = document.getElementById('inbox-avatar-image');
        var inboxAvatarInitials = document.getElementById('inbox-avatar-initials');
        var filterBtn = document.getElementById('inbox-filter-btn');
        var filterLabel = document.getElementById('inbox-filter-label');
        var searchInput = document.getElementById('inbox-search-input');
        var composeFab = document.getElementById('compose-fab');
        var emptySubtitle = document.getElementById('inbox-empty-subtitle');

        var messagesEl = document.getElementById('dm-messages');
        var emptyEl = document.getElementById('dm-empty');
        var inputEl = document.getElementById('dm-input');
        var sendBtn = document.getElementById('dm-send');
        var headerName = document.getElementById('dm-header-name');
        var headerHandle = document.getElementById('dm-header-handle');
        var headerAvatar = document.getElementById('dm-header-avatar');
        var backBtn = document.getElementById('dm-back');

        var appDbPromise = null;
        var currentUser = null;
        var otherUser = null;
        var conversationId = '';
        var pollIntervalId = null;
        var dmWs = null;
        var serverUnavailable = false;
        var lastMessageCount = 0;

        function openAppDb() {
          if (appDbPromise) return appDbPromise;
          appDbPromise = new Promise(function (resolve, reject) {
            var req = window.indexedDB.open(DB_NAME, DB_VERSION);
            req.onsuccess = function () { resolve(req.result); };
            req.onerror = function () { reject(req.error); };
          });
          return appDbPromise;
        }

        function getRecordLocal(store, key) {
          return openAppDb().then(function (db) {
            return new Promise(function (resolve) {
              var tx = db.transaction(store, 'readonly');
              var req = tx.objectStore(store).get(key);
              req.onsuccess = function () { resolve(req.result || null); };
              req.onerror = function () { resolve(null); };
            });
          });
        }

        function getAllRecordsLocal(store) {
          return openAppDb().then(function (db) {
            return new Promise(function (resolve) {
              var tx = db.transaction(store, 'readonly');
              var req = tx.objectStore(store).getAll();
              req.onsuccess = function () { resolve(req.result || []); };
              req.onerror = function () { resolve([]); };
            });
          });
        }

        function getWithUserId() {
          var params = new URLSearchParams(window.location.search);
          return params.get('with') || '';
        }

        function buildConversationId(idA, idB) {
          var sorted = [idA, idB].sort();
          return sorted[0] + ':' + sorted[1];
        }

        function formatTime(ts) {
          try { return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); } catch (e) { return ''; }
        }

        function getInitials(name, username) {
          var n = String(name || username || '').trim();
          var parts = n.split(/\s+/);
          if (parts.length >= 2) return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
          return n.slice(0, 2).toUpperCase() || '?';
        }

        function getAvatarColor(seed) {
          var colors = ['#e02020','#1e88e5','#43a047','#fb8c00','#8e24aa','#00acc1','#d81b60','#546e7a'];
          var hash = 0;
          var s = String(seed || '');
          for (var i = 0; i < s.length; i++) { hash = (hash * 31 + s.charCodeAt(i)) & 0xffffffff; }
          return colors[Math.abs(hash) % colors.length];
        }

        function getWindowSession() {
          if (!window.name || window.name.indexOf(WINDOW_SESSION_PREFIX) !== 0) return null;
          try {
            var payload = JSON.parse(window.name.slice(WINDOW_SESSION_PREFIX.length));
            return payload && payload.userId ? payload : null;
          } catch (e) { return null; }
        }

        function getUserSession() {
          var ws = getWindowSession();
          if (ws) return Promise.resolve(ws);
          return getRecordLocal(SESSION_STORE, 'current').then(function (s) {
            return s && s.userId ? s : null;
          });
        }

        function lookupUserById(userId, accounts) {
          for (var i = 0; i < accounts.length; i++) {
            if (accounts[i].id === userId) return accounts[i];
          }
          return null;
        }

        function serverFetch(method, storeKey, body) {
          if (serverUnavailable) return Promise.reject(new Error('server unavailable'));
          var url = '/api/store/' + encodeURIComponent(MESSAGES_SERVER_STORE) + '/' + encodeURIComponent(storeKey);
          var opts = { method: method };
          if (body !== undefined) {
            opts.headers = { 'Content-Type': 'application/json' };
            opts.body = JSON.stringify({ record: body });
          }
          return fetch(url, opts).then(function (r) {
            if (!r.ok) throw new Error('Server error ' + r.status);
            return r.json();
          }).catch(function (err) {
            serverUnavailable = true;
            throw err;
          });
        }

        function loadConversation() {
          return serverFetch('GET', conversationId).then(function (data) {
            return data && data.record ? data.record : null;
          }).catch(function () { return null; });
        }

        function saveConversation(record) {
          return serverFetch('PUT', conversationId, record).catch(function (err) {
            console.warn('Failed to save conversation', err);
          });
        }

        function renderMessages(record) {
          var messages = (record && Array.isArray(record.messages)) ? record.messages : [];
          messagesEl.querySelectorAll('.dm-bubble-wrap').forEach(function (el) { el.remove(); });

          if (!messages.length) {
            emptyEl.hidden = false;
            return;
          }
          emptyEl.hidden = true;
          messages.forEach(function (msg) { appendBubble(msg); });
          messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function appendBubble(msg) {
          var isOwn = currentUser && msg.senderId === currentUser.id;
          var wrap = document.createElement('div');
          wrap.className = 'dm-bubble-wrap';
          wrap.style.display = 'flex';
          wrap.style.flexDirection = 'column';
          wrap.style.alignItems = isOwn ? 'flex-end' : 'flex-start';

          var bubble = document.createElement('div');
          bubble.className = isOwn ? 'dm-bubble dm-bubble-out' : 'dm-bubble dm-bubble-in';
          bubble.textContent = msg.text || '';

          var meta = document.createElement('div');
          meta.className = 'dm-bubble-meta';
          meta.textContent = formatTime(msg.createdAt);

          wrap.appendChild(bubble);
          wrap.appendChild(meta);
          messagesEl.insertBefore(wrap, emptyEl);
        }

        function incrementAccountField(recordKey, field, by) {
          var url = '/api/store/accounts/' + encodeURIComponent(recordKey) + '/increment';
          return fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ field: field, by: by })
          }).catch(function () {});
        }

        function resetUnreadDmCount() {
          if (!currentUser || serverUnavailable) return;
          var url = '/api/store/accounts/' + encodeURIComponent(currentUser.id);
          fetch(url).then(function (r) { return r.ok ? r.json() : null; }).then(function (data) {
            if (!data || !data.record) return;
            return fetch(url, {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ record: Object.assign({}, data.record, { unreadDmCount: 0 }) })
            });
          }).catch(function () {});
        }

        function sendMessage() {
          var text = (inputEl.value || '').trim();
          if (!text || !currentUser || !conversationId) return;

          inputEl.value = '';
          sendBtn.disabled = true;
          updateSendBtn();

          var msg = {
            id: Date.now() + '-' + Math.random().toString(36).slice(2),
            senderId: currentUser.id,
            text: text,
            createdAt: Date.now()
          };

          emptyEl.hidden = true;
          appendBubble(msg);
          messagesEl.scrollTop = messagesEl.scrollHeight;

          loadConversation().then(function (record) {
            var existing = (record && Array.isArray(record.messages)) ? record.messages : [];
            existing.push(msg);
            return saveConversation({
              id: conversationId,
              participants: [currentUser.id, otherUser ? otherUser.id : ''],
              messages: existing,
              updatedAt: Date.now()
            });
          }).then(function () {
            if (otherUser && otherUser.id) {
              incrementAccountField(otherUser.id, 'unreadDmCount', 1).catch(function (err) {
                console.warn('Failed to increment unread count', err);
              });
            }
          }).finally(function () {
            sendBtn.disabled = false;
          });
        }

        function pollMessages() {
          loadConversation().then(function (record) {
            var messages = (record && Array.isArray(record.messages)) ? record.messages : [];
            if (messages.length !== lastMessageCount) {
              lastMessageCount = messages.length;
              renderMessages(record);
            }
          }).catch(function () {});
        }

        function connectDmWebSocket() {
          if (!conversationId) return;
          try {
            var protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            dmWs = new WebSocket(protocol + '//' + location.host + '/ws?conv=' + encodeURIComponent(conversationId));
            dmWs.onmessage = function (event) {
              try {
                var data = JSON.parse(event.data);
                if (data && data.type === 'dm-update' && data.conversationId === conversationId) pollMessages();
              } catch (e) {}
            };
            dmWs.onclose = function () {
              dmWs = null;
              if (!pollIntervalId) pollIntervalId = setInterval(pollMessages, 10000);
            };
          } catch (e) {
            if (!pollIntervalId) pollIntervalId = setInterval(pollMessages, 10000);
          }
        }

        function updateSendBtn() {
          sendBtn.disabled = !(inputEl.value || '').trim();
        }

        function setInboxAvatar(user) {
          if (!user) return;
          var initials = getInitials(user.name, user.username);
          inboxAvatarInitials.textContent = initials;
          inboxProfileBtn.style.background = getAvatarColor(user.username || user.id);

          var hasPicture = !!user.profilePictureDataUrl;
          if (hasPicture) inboxAvatarImage.src = user.profilePictureDataUrl;
          inboxAvatarImage.hidden = !hasPicture;
          inboxAvatarInitials.hidden = hasPicture;
        }

        function initInboxMode(session, accounts) {
          threadView.style.display = 'none';
          inboxView.style.display = '';
          document.title = 'Messages';

          currentUser = session ? lookupUserById(session.userId, accounts) : null;
          setInboxAvatar(currentUser);

          inboxProfileBtn.addEventListener('click', function () {
            if (!currentUser) {
              window.location.href = 'index.html';
              return;
            }
            window.location.href = 'account-dashboard.html';
          });

          filterBtn.addEventListener('click', function () {
            filterLabel.textContent = (filterLabel.textContent === 'All') ? 'Unread' : 'All';
          });

          searchInput.addEventListener('input', function () {
            var hasQuery = String(searchInput.value || '').trim().length > 0;
            document.getElementById('inbox-empty-state').style.display = hasQuery ? 'none' : '';
          });

          composeFab.addEventListener('click', function () {
            if (!currentUser) {
              window.location.href = 'index.html';
              return;
            }
            emptySubtitle.textContent = 'No chats yet. Start from a profile to message someone.';
          });
        }

        function initThreadMode(session, accounts) {
          inboxView.style.display = 'none';
          composeFab.style.display = 'none';
          document.querySelector('.bottom-nav').style.display = 'none';
          threadView.style.display = 'block';

          var sessionUser = lookupUserById(session.userId, accounts);
          if (!sessionUser) {
            window.location.href = 'index.html';
            return;
          }
          currentUser = sessionUser;

          var withId = getWithUserId();
          otherUser = lookupUserById(withId, accounts);
          conversationId = buildConversationId(session.userId, withId);

          if (otherUser) {
            headerAvatar.style.background = getAvatarColor(otherUser.username || otherUser.id);
            headerAvatar.textContent = getInitials(otherUser.name, otherUser.username);
            headerName.textContent = otherUser.name || otherUser.username || 'User';
            headerHandle.textContent = '@' + (otherUser.username || '');
          }

          backBtn.addEventListener('click', function () { history.back(); });

          inputEl.addEventListener('input', function () {
            updateSendBtn();
            inputEl.style.height = 'auto';
            inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
          });
          inputEl.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && !e.shiftKey) {
              e.preventDefault();
              if (!sendBtn.disabled) sendMessage();
            }
          });
          sendBtn.addEventListener('click', sendMessage);

          loadConversation().then(function (record) {
            lastMessageCount = (record && Array.isArray(record.messages)) ? record.messages.length : 0;
            renderMessages(record);
            resetUnreadDmCount();
          });
          connectDmWebSocket();
        }

        function loadAccountsFromServerOrLocal() {
          return fetch('/api/store/accounts').then(function (r) {
            return r.ok ? r.json() : null;
          }).then(function (data) {
            if (data && Array.isArray(data.records) && data.records.length) return data.records;
            return getAllRecordsLocal(ACCOUNTS_STORE);
          }).catch(function () {
            return getAllRecordsLocal(ACCOUNTS_STORE);
          });
        }

        document.querySelectorAll('[data-nav-target]').forEach(function (button) {
          button.addEventListener('click', function () {
            var target = button.getAttribute('data-nav-target');
            var allowedTargets = {
              'index.html': true,
              'articles.html': true,
              'notifications.html': true
            };
            if (!target || target === 'messages.html') return;
            if (target === 'search') {
              searchInput.focus();
              return;
            }
            if (!allowedTargets[target]) return;
            window.location.href = target;
          });
        });

        getUserSession().then(function (session) {
          return loadAccountsFromServerOrLocal().then(function (accounts) {
            if (getWithUserId()) {
              if (!session) {
                window.location.href = 'index.html';
                return;
              }
              initThreadMode(session, accounts);
              return;
            }
            initInboxMode(session, accounts);
          });
        });

        window.addEventListener('beforeunload', function () {
          if (pollIntervalId) clearInterval(pollIntervalId);
          if (dmWs) { dmWs.onclose = null; dmWs.close(); }
        });
      }());
    </script>
  </body>
</html>
