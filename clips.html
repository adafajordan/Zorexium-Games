<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Clips — Zorexium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      :root {
        --accent: #cc2222;
        --footer-h: 62px;
        --engage-w: 68px;
        color-scheme: light;
      }
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        color: #fff;
      }

      /* ── Clips scroll container ────────────────── */
      .clips-container {
        position: fixed;
        inset: 0;
        overflow-y: scroll;
        scroll-snap-type: y mandatory;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        background: #000;
      }
      .clips-container::-webkit-scrollbar { display: none; }

      /* ── Individual clip ───────────────────────── */
      .clip {
        position: relative;
        width: 100%;
        height: 100vh;
        height: 100dvh;
        scroll-snap-align: start;
        scroll-snap-stop: always;
        overflow: hidden;
        background: #111;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* ── Media layer ───────────────────────────── */
      .clip-media {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
        overflow: hidden;
      }
      .clip-media video,
      .clip-media img {
        width: min(100vw, calc(100vh * 9 / 16));
        height: min(100vh, calc(100vw * 16 / 9));
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
        aspect-ratio: 9 / 16;
        background: #000;
        display: block;
      }
      @supports (height: 100dvh) {
        .clip-media video,
        .clip-media img {
          width: min(100vw, calc(100dvh * 9 / 16));
          height: min(100dvh, calc(100vw * 16 / 9));
        }
      }
      .clip-media-placeholder {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 15px;
        color: rgba(255,255,255,0.5);
        padding: 24px;
        text-align: center;
        line-height: 1.5;
      }

      /* Tap-to-pause overlay */
      .clip-tap-zone {
        position: absolute;
        inset: 0;
        z-index: 5;
        cursor: pointer;
      }
      .clip-paused-icon {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 64px;
        height: 64px;
        background: rgba(0,0,0,0.45);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transition: opacity 0.2s;
        pointer-events: none;
        z-index: 6;
      }
      .clip-paused-icon.visible { opacity: 1; }
      .clip-paused-icon svg { width: 28px; height: 28px; stroke: #fff; fill: #fff; }

      /* ── Right engagement stack ────────────────── */
      .clip-engage {
        position: absolute;
        right: 10px;
        bottom: calc(var(--footer-h) + 72px);
        z-index: 10;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }
      .clip-action {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        background: none;
        border: none;
        color: #fff;
        cursor: pointer;
        padding: 0;
        filter: drop-shadow(0 1px 4px rgba(0,0,0,0.6));
        transition: transform 0.12s;
      }
      .clip-action:active { transform: scale(0.88); }
      .clip-action svg {
        width: 28px;
        height: 28px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2.2;
        stroke-linecap: round;
        stroke-linejoin: round;
        display: block;
      }
      .clip-action.liked svg { stroke: var(--accent); fill: var(--accent); }
      .clip-action.saved svg { stroke: #f0c040; fill: #f0c040; }
      .clip-action-count {
        font-size: 11px;
        font-weight: 600;
        line-height: 1;
        text-shadow: 0 1px 3px rgba(0,0,0,0.7);
        min-width: 28px;
        text-align: center;
      }

      /* Soundtrack disc */
      .clip-soundtrack {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        overflow: hidden;
        border: 3px solid rgba(255,255,255,0.7);
        background: #222;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        animation: spin-disc 8s linear infinite paused;
        filter: drop-shadow(0 1px 4px rgba(0,0,0,0.6));
      }
      .clip.playing .clip-soundtrack { animation-play-state: running; }
      @keyframes spin-disc { to { transform: rotate(360deg); } }
      .clip-soundtrack img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
      .clip-soundtrack svg { width: 20px; height: 20px; stroke: rgba(255,255,255,0.7); fill: none; stroke-width: 2; }

      /* ── Bottom metadata overlay ───────────────── */
      .clip-meta {
        position: absolute;
        left: 0;
        right: calc(var(--engage-w) + 14px);
        bottom: calc(var(--footer-h) + 64px);
        z-index: 10;
        padding: 0 14px;
        pointer-events: none;
      }
      .clip-meta > * { pointer-events: auto; }

      .clip-identity {
        display: flex;
        align-items: center;
        gap: 9px;
        margin-bottom: 8px;
      }
      .clip-avatar {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        background: #444;
        border: 2px solid rgba(255,255,255,0.8);
        object-fit: cover;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        font-size: 15px;
        font-weight: 700;
        color: #fff;
        text-shadow: none;
        cursor: pointer;
      }
      .clip-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
      .clip-profile-link {
        color: inherit;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
      }
      .clip-handle {
        font-size: 14px;
        font-weight: 700;
        text-shadow: 0 1px 4px rgba(0,0,0,0.7);
        cursor: pointer;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 160px;
      }
      .clip-follow-btn {
        background: none;
        border: 1.5px solid rgba(255,255,255,0.9);
        color: #fff;
        font-size: 12px;
        font-weight: 700;
        padding: 3px 12px;
        border-radius: 20px;
        cursor: pointer;
        white-space: nowrap;
        flex-shrink: 0;
        transition: background 0.15s, color 0.15s;
      }
      .clip-follow-btn.following {
        background: rgba(255,255,255,0.2);
        border-color: transparent;
      }
      .clip-follow-btn:hover { background: rgba(255,255,255,0.2); }

      .clip-caption {
        font-size: 13px;
        line-height: 1.45;
        text-shadow: 0 1px 4px rgba(0,0,0,0.7);
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        cursor: pointer;
      }
      .clip-caption.expanded {
        display: block;
        -webkit-line-clamp: unset;
      }

      /* ── Progress bar ──────────────────────────── */
      .clip-progress-wrap {
        position: absolute;
        left: 0;
        right: 0;
        bottom: calc(var(--footer-h) + 52px);
        z-index: 10;
        height: 2px;
        background: rgba(255,255,255,0.25);
        overflow: hidden;
      }
      .clip-progress-bar {
        height: 100%;
        width: 0%;
        background: #fff;
        transition: width 0.2s linear;
      }

      /* ── Comment dock ──────────────────────────── */
      .clip-comment-dock {
        position: absolute;
        left: 0;
        right: 0;
        bottom: var(--footer-h);
        z-index: 10;
        height: 52px;
        display: flex;
        align-items: center;
        padding: 0 12px;
        gap: 8px;
        background: linear-gradient(to top, rgba(0,0,0,0.55) 0%, transparent 100%);
      }
      .clip-comment-input {
        flex: 1;
        height: 36px;
        background: rgba(255,255,255,0.15);
        border: 1px solid rgba(255,255,255,0.25);
        border-radius: 20px;
        color: #fff;
        font-size: 13px;
        padding: 0 14px;
        font-family: inherit;
        outline: none;
        backdrop-filter: blur(4px);
      }
      .clip-comment-input::placeholder { color: rgba(255,255,255,0.6); }
      .clip-comment-input:focus { border-color: rgba(255,255,255,0.5); }
      .clip-comment-send {
        background: none;
        border: none;
        color: #fff;
        cursor: pointer;
        padding: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        flex-shrink: 0;
        opacity: 0.7;
        transition: opacity 0.15s;
      }
      .clip-comment-send:hover { opacity: 1; }
      .clip-comment-send svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }

      /* ── Comment sheet (bottom drawer) ─────────── */
      .comment-sheet-overlay {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 300;
        background: rgba(0,0,0,0.6);
        align-items: flex-end;
      }
      .comment-sheet-overlay.open { display: flex; }
      .comment-sheet {
        width: 100%;
        max-height: 75vh;
        background: #1a1a1a;
        border-radius: 18px 18px 0 0;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .comment-sheet-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 18px 10px;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        flex-shrink: 0;
      }
      .comment-sheet-title { font-size: 15px; font-weight: 700; }
      .comment-sheet-close {
        background: none;
        border: none;
        color: rgba(255,255,255,0.7);
        font-size: 20px;
        cursor: pointer;
        line-height: 1;
        padding: 4px 8px;
      }
      .comment-sheet-list {
        flex: 1;
        overflow-y: auto;
        padding: 12px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .comment-sheet-empty {
        text-align: center;
        color: rgba(255,255,255,0.4);
        font-size: 14px;
        padding: 32px 0;
      }
      .cs-comment {
        display: flex;
        gap: 10px;
        align-items: flex-start;
      }
      .cs-avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: #444;
        flex-shrink: 0;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 700;
      }
      .cs-avatar img { width: 100%; height: 100%; object-fit: cover; }
      .cs-body { flex: 1; min-width: 0; }
      .cs-author { font-size: 12px; font-weight: 700; margin-bottom: 2px; }
      .cs-text { font-size: 13px; line-height: 1.45; color: rgba(255,255,255,0.9); word-break: break-word; }
      .cs-mention { color: #7ab7ff; font-weight: 600; }
      .cs-actions {
        display: flex;
        gap: 12px;
        margin-top: 6px;
      }
      .cs-action-btn {
        border: none;
        background: none;
        color: rgba(255,255,255,0.7);
        font-size: 12px;
        cursor: pointer;
        padding: 0;
      }
      .cs-action-btn.liked { color: var(--accent); }
      .cs-replies {
        margin-top: 8px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .cs-comment.cs-reply {
        margin-left: 2px;
      }
      .cs-reply-box {
        display: flex;
        gap: 8px;
        margin-top: 8px;
      }
      .cs-reply-input {
        flex: 1;
        height: 34px;
        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.2);
        border-radius: 17px;
        color: #fff;
        font-size: 12px;
        padding: 0 12px;
        outline: none;
      }
      .cs-reply-submit {
        border: none;
        border-radius: 17px;
        background: var(--accent);
        color: #fff;
        font-size: 12px;
        font-weight: 600;
        padding: 0 12px;
        height: 34px;
        cursor: pointer;
      }
      .comment-sheet-input-row {
        display: flex;
        gap: 8px;
        align-items: center;
        padding: 10px 14px 14px;
        border-top: 1px solid rgba(255,255,255,0.1);
        flex-shrink: 0;
      }
      .cs-input {
        flex: 1;
        height: 38px;
        background: rgba(255,255,255,0.1);
        border: 1px solid rgba(255,255,255,0.2);
        border-radius: 20px;
        color: #fff;
        font-size: 13px;
        padding: 0 14px;
        font-family: inherit;
        outline: none;
      }
      .cs-input::placeholder { color: rgba(255,255,255,0.4); }
      .cs-submit {
        background: var(--accent);
        border: none;
        color: #fff;
        font-size: 13px;
        font-weight: 600;
        padding: 0 16px;
        height: 38px;
        border-radius: 20px;
        cursor: pointer;
        white-space: nowrap;
      }
      .cs-mention-menu {
        position: absolute;
        left: 14px;
        right: 14px;
        bottom: 64px;
        z-index: 2;
        max-height: 150px;
        overflow-y: auto;
        border: 1px solid rgba(255,255,255,0.14);
        border-radius: 14px;
        background: rgba(32,32,32,0.98);
        display: none;
      }
      .cs-mention-menu.open { display: block; }
      .cs-mention-item {
        display: flex;
        align-items: center;
        gap: 8px;
        width: 100%;
        border: none;
        background: none;
        color: #fff;
        text-align: left;
        font-size: 13px;
        padding: 10px 12px;
        cursor: pointer;
      }
      .cs-mention-item + .cs-mention-item { border-top: 1px solid rgba(255,255,255,0.08); }
      .cs-mention-avatar {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: #555;
        overflow: hidden;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        font-weight: 700;
      }
      .cs-mention-avatar img { width: 100%; height: 100%; object-fit: cover; }

      /* ── Share sheet ───────────────────────────── */
      .share-sheet-overlay {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 300;
        background: rgba(0,0,0,0.6);
        align-items: flex-end;
      }
      .share-sheet-overlay.open { display: flex; }
      .share-sheet {
        width: 100%;
        background: #1a1a1a;
        border-radius: 18px 18px 0 0;
        padding: 20px 18px 30px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .share-sheet-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
      .share-row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }
      .share-opt {
        background: rgba(255,255,255,0.1);
        border: none;
        color: #fff;
        border-radius: 10px;
        padding: 10px 18px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        font-family: inherit;
        flex: 1;
        min-width: 100px;
      }
      .share-opt:hover { background: rgba(255,255,255,0.18); }
      .share-cancel {
        background: rgba(255,255,255,0.07);
        border: none;
        color: rgba(255,255,255,0.7);
        border-radius: 10px;
        padding: 12px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        font-family: inherit;
        text-align: center;
        width: 100%;
      }

      /* ── More options sheet ────────────────────── */
      .more-sheet-overlay {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 300;
        background: rgba(0,0,0,0.6);
        align-items: flex-end;
      }
      .more-sheet-overlay.open { display: flex; }
      .more-sheet {
        width: 100%;
        background: #1a1a1a;
        border-radius: 18px 18px 0 0;
        overflow: hidden;
      }
      .more-sheet-option {
        display: block;
        width: 100%;
        background: none;
        border: none;
        border-bottom: 1px solid rgba(255,255,255,0.07);
        color: #fff;
        font-size: 15px;
        font-family: inherit;
        text-align: left;
        padding: 16px 20px;
        cursor: pointer;
      }
      .more-sheet-option:hover { background: rgba(255,255,255,0.06); }
      .more-sheet-option.danger { color: #e04040; }
      .more-sheet-cancel {
        display: block;
        width: 100%;
        background: rgba(255,255,255,0.07);
        border: none;
        color: rgba(255,255,255,0.8);
        font-size: 15px;
        font-weight: 600;
        font-family: inherit;
        text-align: center;
        padding: 16px;
        cursor: pointer;
        margin-top: 8px;
      }

      /* ── Auth prompt ───────────────────────────── */
      .auth-prompt-overlay {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 400;
        background: rgba(0,0,0,0.7);
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .auth-prompt-overlay.open { display: flex; }
      .auth-prompt {
        background: #1a1a1a;
        border-radius: 14px;
        padding: 28px 24px;
        max-width: 340px;
        width: 100%;
        text-align: center;
      }
      .auth-prompt h2 { font-size: 18px; margin-bottom: 8px; }
      .auth-prompt p { color: rgba(255,255,255,0.6); font-size: 14px; margin-bottom: 20px; }
      .auth-prompt-btns { display: flex; gap: 10px; }
      .auth-prompt-btn {
        flex: 1;
        padding: 11px;
        border-radius: 8px;
        border: none;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        font-family: inherit;
      }
      .auth-prompt-btn.primary { background: var(--accent); color: #fff; }
      .auth-prompt-btn.secondary { background: rgba(255,255,255,0.1); color: #fff; }

      /* ── Empty state ───────────────────────────── */
      .clips-empty {
        width: 100%;
        height: 100vh;
        height: 100dvh;
        scroll-snap-align: start;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        padding: 40px;
        text-align: center;
        color: rgba(255,255,255,0.5);
      }
      .clips-empty svg { width: 56px; height: 56px; stroke: rgba(255,255,255,0.25); fill: none; stroke-width: 1.5; }
      .clips-empty h2 { font-size: 20px; color: rgba(255,255,255,0.75); }
      .clips-empty p { font-size: 14px; max-width: 260px; line-height: 1.6; }

      /* ── Sticky footer ─────────────────────────── */
      .sticky-footer {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 100;
        height: var(--footer-h);
        background: #fff;
        border-top: 1px solid #e0e0e0;
        display: flex;
        align-items: center;
        justify-content: space-around;
        padding: 0 6px;
      }
      .sticky-footer-item {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: #666;
        width: 44px;
        height: 44px;
        background: none;
        border: none;
        cursor: pointer;
        padding: 0;
        text-decoration: none;
        transition: color 0.15s;
      }
      .sticky-footer-item:hover,
      .sticky-footer-item.active {
        color: var(--accent);
      }
      .sticky-footer-item svg {
        width: 24px;
        height: 24px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2.5;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .sticky-footer-item.active svg {
        fill: currentColor;
      }

      /* ── Loading state ─────────────────────────── */
      .clips-loading {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #fff;
      }
      .clips-loading-spinner {
        width: 36px;
        height: 36px;
        border: 3px solid rgba(0,0,0,0.15);
        border-top-color: #cc2222;
        border-radius: 50%;
        animation: spin 0.75s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>

    <!-- Loading overlay -->
    <div class="clips-loading" id="clips-loading">
      <div class="clips-loading-spinner"></div>
    </div>

    <!-- Clips scroll container -->
    <div class="clips-container" id="clips-container" role="main" aria-label="Clips feed"></div>

    <!-- Comment sheet -->
    <div class="comment-sheet-overlay" id="comment-sheet-overlay" role="dialog" aria-modal="true" aria-labelledby="comment-sheet-title">
      <div class="comment-sheet">
        <div class="comment-sheet-header">
          <span class="comment-sheet-title" id="comment-sheet-title">Comments</span>
          <button class="comment-sheet-close" id="comment-sheet-close" type="button" aria-label="Close comments">&#10005;</button>
        </div>
        <div class="comment-sheet-list" id="comment-sheet-list"></div>
        <div class="comment-sheet-input-row">
          <input class="cs-input" id="cs-input" type="text" placeholder="Add a comment..." autocomplete="off" maxlength="500" />
          <button class="cs-submit" id="cs-submit" type="button">Post</button>
        </div>
        <div class="cs-mention-menu" id="cs-mention-menu" aria-label="Mention suggestions" role="listbox"></div>
      </div>
    </div>

    <!-- Share sheet -->
    <div class="share-sheet-overlay" id="share-sheet-overlay" role="dialog" aria-modal="true" aria-label="Share options">
      <div class="share-sheet">

    <script>
    (function () {
      /* ── IndexedDB helpers (mirrors app.js schema) ──────────── */
      var DB_NAME = 'zorexium-app-db';
      var DB_VERSION = 4;
      var ACCOUNTS_STORE = 'accounts';
      var POSTS_STORE = 'posts';
      var SESSION_STORE = 'session';
      var MEDIA_STORE = 'media';
      var COMMENTS_STORE = 'comments';
      var WINDOW_SESSION_PREFIX = 'zorexium-session:';
      var serverDown = false;

      var db = null;
      var currentUser = null;
      var activePostId = null; // for comment sheet
      var activeMentionInput = null;
      var clips = []; // rendered clip elements
      var accountLookup = {};
      var accountAvatarCache = {};
      var audioUnlocked = false;
      var userGestureArmed = false;
      var MAX_CLIPS_COUNT = 30;
      var MENTION_MENU_BLUR_DELAY = 120;
      var MENTION_TOKEN_PATTERN = '@([a-zA-Z0-9_]+)';
      var TRAILING_MENTION_PATTERN = '(?:^|\\s)@([a-zA-Z0-9_]*)$';
      var HOLD_TO_PAUSE_MS = 220;
      var MIN_AUDIBLE_VOLUME = 0.05;

      function openDB() {
        return new Promise(function (resolve, reject) {
          var req = indexedDB.open(DB_NAME, DB_VERSION);
          req.onerror = function () { reject(req.error); };
          req.onsuccess = function () { db = req.result; resolve(db); };
          req.onupgradeneeded = function (e) {
            var d = e.target.result;
            if (!d.objectStoreNames.contains(ACCOUNTS_STORE))
              d.createObjectStore(ACCOUNTS_STORE, { keyPath: 'id' });
            if (!d.objectStoreNames.contains(POSTS_STORE))
              d.createObjectStore(POSTS_STORE, { keyPath: 'id' });
            if (!d.objectStoreNames.contains(SESSION_STORE))
              d.createObjectStore(SESSION_STORE, { keyPath: 'key' });
            if (!d.objectStoreNames.contains(MEDIA_STORE))
              d.createObjectStore(MEDIA_STORE, { keyPath: 'id' });
            if (!d.objectStoreNames.contains(COMMENTS_STORE))
              d.createObjectStore(COMMENTS_STORE, { keyPath: 'id' });
          };
        });
      }

      function getAllRecords(storeName) {
        return new Promise(function (resolve, reject) {
          var tx = db.transaction(storeName, 'readonly');
          var store = tx.objectStore(storeName);
          var req = store.getAll();
          req.onsuccess = function () { resolve(req.result || []); };
          req.onerror = function () { reject(req.error); };
        });
      }

      function getRecord(storeName, id) {
        return new Promise(function (resolve, reject) {
          var tx = db.transaction(storeName, 'readonly');
          var req = tx.objectStore(storeName).get(id);
          req.onsuccess = function () { resolve(req.result || null); };
          req.onerror = function () { reject(req.error); };
        });
      }

      function putRecord(storeName, record) {
        return new Promise(function (resolve, reject) {
          var tx = db.transaction(storeName, 'readwrite');
          var req = tx.objectStore(storeName).put(record);
          req.onsuccess = function () { resolve(); };
          req.onerror = function () { reject(req.error); };
        });
      }

      function deserializeServerRecord(value) {
        if (!value || typeof value !== 'object') return value;
        if (value.__zorexiumType === 'arrayBuffer' && typeof value.base64 === 'string') {
          var binary = atob(value.base64);
          var bytes = new Uint8Array(binary.length);
          for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
          return bytes.buffer;
        }
        if (Array.isArray(value)) return value.map(deserializeServerRecord);
        var out = {};
        Object.keys(value).forEach(function (key) {
          out[key] = deserializeServerRecord(value[key]);
        });
        return out;
      }

      function fetchStoreRecords(storeName, key) {
        if (serverDown) return Promise.reject(new Error('server down'));
        var url = '/api/store/' + encodeURIComponent(storeName) + (key ? '/' + encodeURIComponent(String(key)) : '');
        return fetch(url).then(function (response) {
          if (!response.ok) throw new Error('server ' + response.status);
          return response.json();
        }).then(function (payload) {
          if (payload && payload.record) {
            payload.record = deserializeServerRecord(payload.record);
          }
          if (payload && Array.isArray(payload.records)) {
            payload.records = payload.records.map(deserializeServerRecord);
          }
          return payload;
        }).catch(function (error) {
          serverDown = true;
          throw error;
        });
      }

      function getAllRecordsWithServerFallback(storeName) {
        return fetchStoreRecords(storeName).then(function (payload) {
          return payload && Array.isArray(payload.records) ? payload.records : [];
        }).catch(function () {
          return getAllRecords(storeName);
        });
      }

      function getRecordWithServerFallback(storeName, id) {
        return getRecord(storeName, id).then(function (localRecord) {
          if (localRecord) return localRecord;
          return fetchStoreRecords(storeName, id).then(function (payload) {
            return payload && payload.record ? payload.record : null;
          }).catch(function () {
            return null;
          });
        });
      }

      function generateId(prefix) {
        return (prefix || 'id') + '-' + Date.now() + '-' + Math.random().toString(36).slice(2, 8);
      }

      function formatCount(n) {
        n = parseInt(n, 10) || 0;
        if (n >= 1000000) return (n / 1000000).toFixed(1).replace(/\.0$/, '') + 'M';
        if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'K';
        return String(n);
      }

      function escapeHtml(text) {
        return String(text || '').replace(/[&<>"']/g, function (char) {
          return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[char] || char;
        });
      }

      function buildProfileHref(userId) {
        var targetId = String(userId || '').trim();
        return targetId ? ('account-dashboard.html?user=' + encodeURIComponent(targetId)) : 'account-dashboard.html';
      }

      function navigateToProfile(userId) {
        window.location.href = buildProfileHref(userId);
      }

      /* ── Session / auth ─────────────────────────────────────── */
      function getWindowSession() {
        if (!window.name || window.name.indexOf(WINDOW_SESSION_PREFIX) !== 0) return null;
        try {
          var payload = JSON.parse(window.name.slice(WINDOW_SESSION_PREFIX.length));
          return payload && payload.userId ? payload : null;
        } catch (error) {
          return null;
        }
      }

      async function getCurrentSession() {
        var windowSession = getWindowSession();
        if (windowSession && windowSession.userId) return windowSession;
        var persisted = await getRecord(SESSION_STORE, 'current');
        if (persisted && persisted.userId) return persisted;
        var sessions = await getAllRecords(SESSION_STORE);
        var fallback = null;
        for (var i = 0; i < sessions.length; i++) {
          var session = sessions[i];
          if (!session || !session.userId) continue;
          if (session.active) return session;
          if (!fallback) fallback = session;
        }
        return fallback;
      }

      async function loadCurrentUser() {
        try {
          var session = await getCurrentSession();
          if (!session) return null;
          var user = await getRecordWithServerFallback(ACCOUNTS_STORE, session.userId || session.id);
          return user || null;
        } catch (e) { return null; }
      }

      /* ── Like / Save / Comment ──────────────────────────────── */
      async function persistCurrentUser() {
        if (!currentUser) return;
        await putRecord(ACCOUNTS_STORE, currentUser);
      }

      function syncClipActionCount(postId, action, count) {
        var nextCount = Math.max(0, Math.round(Number(count) || 0));
        container.querySelectorAll('.clip-action[data-post-id="' + postId + '"][data-action="' + action + '"] .clip-action-count').forEach(function (node) {
          node.textContent = formatCount(nextCount);
        });
      }

      async function updatePostCount(postId, field, delta) {
        var post = await getRecord(POSTS_STORE, postId);
        if (!post) return 0;
        var current = Math.max(0, Math.round(Number(post[field]) || 0));
        var next = delta < 0 ? Math.max(0, current + delta) : current + delta;
        post[field] = next;
        await putRecord(POSTS_STORE, post);
        return next;
      }

      function formatCommentTextWithMentions(text) {
        var escaped = escapeHtml(text);
        return escaped.replace(new RegExp(MENTION_TOKEN_PATTERN, 'g'), function (full) {
          return '<span class="cs-mention">' + escapeHtml(full) + '</span>';
        });
      }

      function extractMentionHandles(text) {
        var found = String(text || '').match(new RegExp(MENTION_TOKEN_PATTERN, 'g')) || [];
        var unique = {};
        found.forEach(function (token) { unique[token.slice(1).toLowerCase()] = true; });
        return Object.keys(unique);
      }

      function getCommentActionIds(fieldName) {
        if (!currentUser) return [];
        return Array.isArray(currentUser[fieldName]) ? currentUser[fieldName].slice() : [];
      }

      async function toggleCommentLike(commentId) {
        if (!currentUser) { showAuthPrompt(); return { active: false, count: 0 }; }
        var ids = getCommentActionIds('likedCommentIds');
        var index = ids.indexOf(commentId);
        var active = index === -1;
        if (active) ids.push(commentId);
        else ids.splice(index, 1);
        currentUser = Object.assign({}, currentUser, { likedCommentIds: ids });
        await persistCurrentUser();
        var count = await updatePostlessCommentCount(commentId, 'likeCount', active ? 1 : -1);
        return { active: active, count: count };
      }

      async function updatePostlessCommentCount(commentId, field, delta) {
        var comment = await getRecord(COMMENTS_STORE, commentId);
        if (!comment) return 0;
        var current = Math.max(0, Math.round(Number(comment[field]) || 0));
        var next = delta < 0 ? Math.max(0, current + delta) : current + delta;
        comment[field] = next;
        await putRecord(COMMENTS_STORE, comment);
        return next;
      }

      async function toggleLike(postId, btn, countEl) {
        if (!currentUser) { showAuthPrompt(); return; }
        var liked = (currentUser.likedPostIds || []).slice();
        var idx = liked.indexOf(postId);
        var isLiked = idx !== -1;
        if (isLiked) {
          liked.splice(idx, 1);
        } else {
          liked.push(postId);
        }
        var likeCount = await updatePostCount(postId, 'likeCount', isLiked ? -1 : 1);
        currentUser = Object.assign({}, currentUser, { likedPostIds: liked });
        await persistCurrentUser();
        var nowLiked = !isLiked;
        btn.classList.toggle('liked', nowLiked);
        if (countEl) countEl.textContent = formatCount(likeCount);
        syncClipActionCount(postId, 'like', likeCount);
      }

      async function toggleSave(postId, btn, countEl) {
        if (!currentUser) { showAuthPrompt(); return; }
        var saved = (currentUser.savedPostIds || []).slice();
        var idx = saved.indexOf(postId);
        var isSaved = idx !== -1;
        if (isSaved) {
          saved.splice(idx, 1);
        } else {
          saved.push(postId);
        }
        var saveCount = await updatePostCount(postId, 'saveCount', isSaved ? -1 : 1);
        currentUser = Object.assign({}, currentUser, { savedPostIds: saved });
        await persistCurrentUser();
        btn.classList.toggle('saved', !isSaved);
        if (countEl) countEl.textContent = formatCount(saveCount);
        syncClipActionCount(postId, 'save', saveCount);
      }

      async function postComment(postId, text, parentCommentId) {
        if (!currentUser) { showAuthPrompt(); return; }
        text = String(text).trim();
        if (!text) return;
        var mentionHandles = extractMentionHandles(text);
        var mentionUserIds = mentionHandles.map(function (handle) {
          var user = accountLookup[handle];
          return user ? user.id : null;
        }).filter(Boolean);
        var comment = {
          id: generateId('comment'),
          postId: postId,
          userId: currentUser.id,
          authorName: currentUser.name || currentUser.username || 'You',
          text: text,
          parentCommentId: parentCommentId || null,
          mentionHandles: mentionHandles,
          mentionUserIds: mentionUserIds,
          likeCount: 0,
          replyCount: 0,
          createdAt: Date.now()
        };
        await putRecord(COMMENTS_STORE, comment);
        var commentCount = await updatePostCount(postId, 'commentCount', 1);
        syncClipActionCount(postId, 'comment', commentCount);
        if (parentCommentId) {
          await updatePostlessCommentCount(parentCommentId, 'replyCount', 1);
        }
        return comment;
      }

      /* ── Media blob loading ─────────────────────────────────── */
      function loadMediaBlob(mediaId) {
        return new Promise(function (resolve) {
          if (!mediaId) { resolve(null); return; }
          getRecordWithServerFallback(MEDIA_STORE, mediaId).then(function (record) {
            if (!record) { resolve(null); return; }
            try {
              var type = String(record.type || record.mimeType || record.contentType || '').trim();
              var blob = null;
              if (record.data instanceof Blob) blob = record.data;
              else if (record.data instanceof ArrayBuffer) blob = new Blob([record.data], { type: type || 'application/octet-stream' });
              else if (record.blob instanceof Blob) blob = record.blob;
              else if (record.file instanceof Blob) blob = record.file;
              if (!type && blob && blob.type) type = String(blob.type || '').trim();
              if (blob) {
                var url = URL.createObjectURL(blob);
                resolve({ url: url, type: type || blob.type || '' });
                return;
              }
              var dataUrl = String(record.dataUrl || record.url || '').trim();
              if (dataUrl) {
                if (!type) {
                  var dataUrlMatch = dataUrl.match(/^data:([^;,]+)[;,]/i);
                  if (dataUrlMatch && dataUrlMatch[1]) type = String(dataUrlMatch[1]).trim();
                }
                resolve({ url: dataUrl, type: type || '' });
                return;
              }
              resolve(null);
            } catch (e) { resolve(null); }
          }).catch(function () { resolve(null); });
        });
      }

      function hasGifUrl(post) {
        return Boolean(String((post && post.gifUrl) || '').trim());
      }

      function getPostVideoMediaId(post) {
        if (!post || typeof post !== 'object') return '';
        var explicitId = String(post.videoMediaId || '').trim();
        if (explicitId) return explicitId;
        return String(post.mediaId || '').trim();
      }

      function shouldTreatPostAsVideo(post, mediaInfo) {
        if (!post) return false;
        var mediaType = String(post.mediaType || '').trim().toLowerCase();
        if (mediaType.indexOf('video') === 0) return true;
        if (mediaInfo && String(mediaInfo.type || '').toLowerCase().indexOf('video') === 0) return true;
        if (String(post.videoMediaId || '').trim()) return true;
        var hasImageArray = Array.isArray(post.imageMediaIds) && post.imageMediaIds.length > 0;
        return Boolean(String(post.mediaId || '').trim() && !hasImageArray && !hasGifUrl(post));
      }

      function isPostPublished(post) {
        if (!post || typeof post !== 'object') return false;
        var scheduledAt = Number(post.scheduledAt || 0);
        return !(scheduledAt && scheduledAt > Date.now());
      }

      function mediaRecordToDataUrl(record) {
        return new Promise(function (resolve) {
          if (!record || !record.data) { resolve(''); return; }
          try {
            var blob = record.data instanceof Blob ? record.data : new Blob([record.data], { type: record.type || 'image/*' });
            var reader = new FileReader();
            reader.onload = function () { resolve(typeof reader.result === 'string' ? reader.result : ''); };
            reader.onerror = function () { resolve(''); };
            reader.readAsDataURL(blob);
          } catch (e) {
            resolve('');
          }
        });
      }

      async function resolveUserAvatarUrl(user) {
        if (!user) return '';
        var legacy = String(user.profilePictureDataUrl || '').trim();
        if (legacy) return legacy;
        var profileImageMediaId = String(user.profileImageMediaId || '').trim();
        if (!profileImageMediaId) return '';
        try {
          var mediaRecord = await getRecordWithServerFallback(MEDIA_STORE, profileImageMediaId);
          return await mediaRecordToDataUrl(mediaRecord);
        } catch (error) {
          return '';
        }
      }

      async function applyStickyFooterAvatar() {
        var sfProfile = document.getElementById('sticky-footer-profile');
        if (!sfProfile) return;
        var avatarUrl = await resolveUserAvatarUrl(currentUser);
        if (avatarUrl) {
          var img = document.createElement('img');
          img.src = avatarUrl;
          img.alt = '';
          img.width = 24;
          img.height = 24;
          img.style.width = '24px';
          img.style.height = '24px';
          img.style.borderRadius = '50%';
          img.style.objectFit = 'cover';
          img.style.display = 'block';
          sfProfile.replaceChildren(img);
        }
      }

      /* ── Gradient palette for placeholder cards ─────────────── */
      var GRADIENTS = [
        'linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%)',
        'linear-gradient(135deg, #2d1b69 0%, #11998e 100%)',
        'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
        'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)',
        'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)',
        'linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)',
        'linear-gradient(135deg, #fa709a 0%, #fee140 100%)',
        'linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%)',
      ];

      function ensureClipAudioInteractionHooks() {
        if (userGestureArmed) return;
        userGestureArmed = true;
        ['touchstart', 'click', 'keydown'].forEach(function (eventName) {
          document.addEventListener(eventName, function () {
            if (audioUnlocked) return;
            var activeClip = clips.find(function (node) { return node && node.classList.contains('playing') && node.video; }) || clips[0];
            if (activeClip && activeClip.video) {
              activateClipAudio(activeClip, false);
            }
          }, { once: true });
        });
      }

      function activateClipAudio(clip, forceUnmute) {
        var video = clip && clip.video;
        if (!video) return;
        if (forceUnmute || audioUnlocked) {
          video.muted = false;
          if (video.volume < MIN_AUDIBLE_VOLUME) video.volume = 1;
        }
        video.play().then(function () {
          if (!video.muted) audioUnlocked = true;
        }).catch(function () {
          video.muted = true;
          video.play().catch(function () {});
        });
      }

      /* ── Build a single clip element ────────────────────────── */
      function buildClip(post, mediaInfo, author) {
        var clip = document.createElement('div');
        clip.className = 'clip';
        clip.setAttribute('data-post-id', post.id);
        var profileHref = buildProfileHref(author && author.id);
        var displayName = (author && (author.name || author.username)) || 'Unknown';

        /* Media layer */
        var mediaDiv = document.createElement('div');
        mediaDiv.className = 'clip-media';

        if (mediaInfo) {
          var isVideo = mediaInfo.type && mediaInfo.type.startsWith('video');
          if (isVideo) {
            var video = document.createElement('video');
            video.src = mediaInfo.url;
            video.muted = true;
            video.loop = true;
            video.playsInline = true;
            video.setAttribute('playsinline', '');
            video.setAttribute('webkit-playsinline', '');
            video.preload = 'metadata';
            video.setAttribute('muted', '');
            clip.dataset.video = 'true';
            clip.video = video;
            video.addEventListener('volumechange', function () {
              if (!video.muted && video.volume > 0) audioUnlocked = true;
            });
            mediaDiv.appendChild(video);
          } else {
            var img = document.createElement('img');
            img.src = mediaInfo.url;
            img.alt = post.text ? post.text.slice(0, 80) : 'Clip';
            img.loading = 'lazy';
            mediaDiv.appendChild(img);
          }
        } else {
          /* Placeholder gradient with post text */
          var gi = Math.abs(hashStr(post.id)) % GRADIENTS.length;
          mediaDiv.style.background = GRADIENTS[gi];
          var ph = document.createElement('div');
          ph.className = 'clip-media-placeholder';
          ph.textContent = post.text || '';
          mediaDiv.appendChild(ph);
        }
        clip.appendChild(mediaDiv);

        /* Tap-to-pause zone */
        var tapZone = document.createElement('div');
        tapZone.className = 'clip-tap-zone';
        var pauseIcon = document.createElement('div');
        pauseIcon.className = 'clip-paused-icon';
        pauseIcon.innerHTML = '<svg viewBox="0 0 24 24" aria-hidden="true"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';
        tapZone.appendChild(pauseIcon);
        clip.appendChild(tapZone);

        if (clip.dataset.video) {
          var holdDelay = null;
          var holdPaused = false;
          var wasPlayingOnHoldStart = false;
          var suppressNextTap = false;
          function onHoldStart() {
            var v = clip.video;
            wasPlayingOnHoldStart = Boolean(v && !v.paused);
            holdPaused = false;
            clearTimeout(holdDelay);
            holdDelay = setTimeout(function () {
              if (!v || v.paused) return;
              v.pause();
              holdPaused = true;
              pauseIcon.classList.add('visible');
              clip.classList.remove('playing');
            }, HOLD_TO_PAUSE_MS);
          }
          function onHoldEnd() {
            clearTimeout(holdDelay);
            holdDelay = null;
            if (!holdPaused) return;
            holdPaused = false;
            suppressNextTap = true;
            if (wasPlayingOnHoldStart) {
              activateClipAudio(clip, false);
              pauseIcon.classList.remove('visible');

              pauseIcon.classList.remove('visible');

      function makeEngageBtn(svgMarkup, countText, ariaLabel) {
        var btn = document.createElement('button');
        btn.className = 'clip-action';
        btn.type = 'button';
        btn.setAttribute('aria-label', ariaLabel || '');
        btn.innerHTML = svgMarkup;
        var countEl = document.createElement('span');
        countEl.className = 'clip-action-count';
        countEl.textContent = countText !== null ? (countText || '') : '';
        btn.appendChild(countEl);
        return btn;
      }

      function hashStr(str) {
        var h = 0;
        for (var i = 0; i < str.length; i++) { h = ((h << 5) - h) + str.charCodeAt(i); h |= 0; }
        return h;
      }

      /* ── IntersectionObserver for autoplay ──────────────────── */
      var observer = new IntersectionObserver(function (entries) {
        entries.forEach(function (entry) {
          var clipEl = entry.target;
          var video = clipEl.video;
          if (entry.isIntersecting) {
            clipEl.classList.add('playing');
            if (video) {
              if (audioUnlocked) activateClipAudio(clipEl, true);
              else {
                video.muted = true;
                video.play().catch(function () {});
              }
            }
            /* Fake progress for images */
            if (clipEl._fakeProgress) {
              startFakeProgress(clipEl);
            }
          } else {
            clipEl.classList.remove('playing');
            if (video) { video.pause(); }
            if (clipEl._fakeProgressTimer) {
              clearInterval(clipEl._fakeProgressTimer);
              clipEl._fakeProgressTimer = null;
              clipEl._fakeProgress.style.width = '0%';
            }
          }
        });
      }, { threshold: 0.6 });

      function startFakeProgress(clipEl) {
        if (clipEl._fakeProgressTimer) clearInterval(clipEl._fakeProgressTimer);
        var bar = clipEl._fakeProgress;
        var pct = 0;
        clipEl._fakeProgressTimer = setInterval(function () {
          pct += 0.5;
          if (pct >= 100) { pct = 0; }
          bar.style.width = pct + '%';
        }, 150);
      }

      /* ── Comment sheet ──────────────────────────────────────── */
      var commentSheetOverlay = document.getElementById('comment-sheet-overlay');
      var commentSheetList = document.getElementById('comment-sheet-list');
      var commentSheetClose = document.getElementById('comment-sheet-close');
      var csInput = document.getElementById('cs-input');
      var csSubmit = document.getElementById('cs-submit');
      var mentionMenu = document.getElementById('cs-mention-menu');
      var mentionContext = null;

      function closeMentionMenu() {
        mentionMenu.classList.remove('open');
        mentionMenu.innerHTML = '';
        mentionContext = null;
      }

      function hydrateCommentUser(comment) {
        var user = accountLookup[comment.userId] || null;
        if (!user && comment.userId) user = { id: comment.userId, name: comment.authorName || 'Unknown', username: '' };
        return user;
      }

      function getMentionCandidates(query) {
        var q = String(query || '').toLowerCase();
        var list = Object.keys(accountLookup).map(function (key) { return accountLookup[key]; }).filter(function (user) {
          return user && user.id;
        }).filter(function (user, index, arr) {
          return arr.findIndex(function (other) { return other.id === user.id; }) === index;
        });
        return list.filter(function (user) {
          var username = String(user.username || '').toLowerCase();
          var name = String(user.name || '').toLowerCase();
          return username.indexOf(q) === 0 || name.indexOf(q) === 0;
        }).slice(0, 6);
      }

      function applyMentionToInput(user) {
        if (!mentionContext || !mentionContext.input || !user) return;
        var input = mentionContext.input;
        var value = String(input.value || '');
        var before = value.slice(0, mentionContext.start);
        var after = value.slice(mentionContext.end);
        input.value = before + '@' + user.username + ' ' + after;
        var caret = (before + '@' + user.username + ' ').length;
        input.focus();
        if (typeof input.setSelectionRange === 'function') input.setSelectionRange(caret, caret);
        closeMentionMenu();
      }

      function refreshMentionMenu(input) {
        if (!input) return closeMentionMenu();
        var value = String(input.value || '');
        var cursor = typeof input.selectionStart === 'number' ? input.selectionStart : value.length;
        var beforeCursor = value.slice(0, cursor);
        var matched = beforeCursor.match(new RegExp(TRAILING_MENTION_PATTERN));
        if (!matched) return closeMentionMenu();
        var query = matched[1] || '';
        var rawToken = matched[0];
        var start = cursor - rawToken.length + (rawToken.charAt(0) === ' ' ? 1 : 0);
        var results = getMentionCandidates(query).filter(function (user) { return user.username; });
        if (!results.length) return closeMentionMenu();
        mentionContext = { input: input, start: start, end: cursor };
        mentionMenu.innerHTML = '';
        results.forEach(function (user) {
          var row = document.createElement('button');
          row.type = 'button';
          row.className = 'cs-mention-item';
          row.setAttribute('role', 'option');
          var av = document.createElement('span');
          av.className = 'cs-mention-avatar';
          var avatarUrl = accountAvatarCache[user.id] || '';
          if (avatarUrl) {
            var img = document.createElement('img');
            img.src = avatarUrl;
            img.alt = '';
            av.appendChild(img);
          } else {
            av.textContent = (user.name || user.username || '?').charAt(0).toUpperCase();
          }
          var text = document.createElement('span');
          text.textContent = (user.name || user.username) + ' @' + user.username;
          row.appendChild(av);
          row.appendChild(text);
          row.addEventListener('click', function () { applyMentionToInput(user); });
          mentionMenu.appendChild(row);
        });
        mentionMenu.classList.add('open');
      }
      document.addEventListener('click', function (event) {
        if (!mentionMenu.classList.contains('open')) return;
        if (mentionMenu.contains(event.target)) return;
        if (activeMentionInput && event.target === activeMentionInput) return;
        closeMentionMenu();
      });

      function renderCommentNode(comment, repliesByParent, nested) {
        var user = hydrateCommentUser(comment);
        var item = document.createElement('div');
        item.className = 'cs-comment' + (nested ? ' cs-reply' : '');
        var avatar = document.createElement(user && user.id ? 'a' : 'div');
        avatar.className = 'cs-avatar';
        if (user && user.id) avatar.href = buildProfileHref(user.id);
        var avatarUrl = (user && user.id && accountAvatarCache[user.id]) || '';
        if (avatarUrl) {
          var avImg = document.createElement('img');
          avImg.src = avatarUrl;
          avImg.alt = '';
          avatar.appendChild(avImg);
        } else {
          avatar.textContent = (user && (user.name || user.username || '?') || '?').charAt(0).toUpperCase();
        }
        item.appendChild(avatar);

        var body = document.createElement('div');
        body.className = 'cs-body';
        var author = document.createElement(user && user.id ? 'a' : 'div');
        author.className = 'cs-author';
        author.textContent = user ? (user.name || user.username || 'Unknown') : (comment.authorName || 'Unknown');
        if (user && user.id) author.href = buildProfileHref(user.id);
        var text = document.createElement('div');
        text.className = 'cs-text';
        text.innerHTML = formatCommentTextWithMentions(comment.text);
        body.appendChild(author);
        body.appendChild(text);

        var actions = document.createElement('div');
        actions.className = 'cs-actions';
        var likedCommentIds = getCommentActionIds('likedCommentIds');
        var liked = likedCommentIds.indexOf(comment.id) !== -1;
        var likeBtn = document.createElement('button');
        likeBtn.type = 'button';
        likeBtn.className = 'cs-action-btn' + (liked ? ' liked' : '');
        likeBtn.textContent = 'Like · ' + Math.max(0, Math.round(Number(comment.likeCount) || 0));
        likeBtn.addEventListener('click', async function () {
          if (!currentUser) { showAuthPrompt(); return; }
          var state = await toggleCommentLike(comment.id);
          likeBtn.classList.toggle('liked', state.active);
          likeBtn.textContent = 'Like · ' + state.count;
        });
        actions.appendChild(likeBtn);

        var replyBtn = document.createElement('button');
        replyBtn.type = 'button';
        replyBtn.className = 'cs-action-btn';
        var replyChildren = repliesByParent[comment.id] || [];
        replyBtn.textContent = 'Reply · ' + replyChildren.length;
        actions.appendChild(replyBtn);
        body.appendChild(actions);

        replyBtn.addEventListener('click', function () {
          if (!currentUser) { showAuthPrompt(); return; }
          var existing = body.querySelector('.cs-reply-box');
          if (existing) { existing.remove(); return; }
          var replyBox = document.createElement('div');
          replyBox.className = 'cs-reply-box';
          var replyInput = document.createElement('input');
          replyInput.type = 'text';
          replyInput.maxLength = 500;
          replyInput.className = 'cs-reply-input';
          replyInput.placeholder = user && user.username ? ('Reply to @' + user.username + '...') : 'Reply...';
          var replySubmit = document.createElement('button');
          replySubmit.type = 'button';
          replySubmit.className = 'cs-reply-submit';
          replySubmit.textContent = 'Reply';
          replySubmit.addEventListener('click', async function () {
            var value = replyInput.value.trim();
            if (!value || !activePostId) return;
            await postComment(activePostId, value, comment.id);
            closeMentionMenu();
            await openCommentSheet(activePostId);
          });
          replyInput.addEventListener('input', function () { refreshMentionMenu(replyInput); });
          replyInput.addEventListener('focus', function () {
            activeMentionInput = replyInput;
            refreshMentionMenu(replyInput);
          });
          replyInput.addEventListener('blur', function () {
            setTimeout(function () {
              var isReplyInputFocused = document.activeElement && document.activeElement.classList && document.activeElement.classList.contains('cs-reply-input');
              if (document.activeElement !== csInput && !isReplyInputFocused) closeMentionMenu();
            }, MENTION_MENU_BLUR_DELAY);
          });
          replyInput.addEventListener('keydown', function (event) {
            if (event.key === 'Enter') {
              event.preventDefault();
              replySubmit.click();
            }
          });
          replyBox.appendChild(replyInput);
          replyBox.appendChild(replySubmit);
          body.appendChild(replyBox);
          activeMentionInput = replyInput;
          replyInput.focus();
        });

        var replies = repliesByParent[comment.id] || [];
        if (replies.length) {
          var repliesWrap = document.createElement('div');
          repliesWrap.className = 'cs-replies';
          replies.forEach(function (child) {
            repliesWrap.appendChild(renderCommentNode(child, repliesByParent, true));
          });
          body.appendChild(repliesWrap);
        }

        item.appendChild(body);
        return item;
      }

      async function openCommentSheet(postId) {
        activePostId = postId;
        commentSheetList.innerHTML = '';
        commentSheetOverlay.classList.add('open');
        try {
          var allComments = await getAllRecords(COMMENTS_STORE);
          var postComments = allComments.filter(function (c) { return c.postId === postId; }).sort(function (a, b) {
            return (b.createdAt || 0) - (a.createdAt || 0);
          });
          if (postComments.length === 0) {
            commentSheetList.innerHTML = '<p class="comment-sheet-empty">No comments yet. Be the first!</p>';
          } else {
            var repliesByParent = {};
            postComments.forEach(function (c) {
              if (!c.parentCommentId) return;
              if (!repliesByParent[c.parentCommentId]) repliesByParent[c.parentCommentId] = [];
              repliesByParent[c.parentCommentId].push(c);
            });
            postComments.filter(function (c) { return !c.parentCommentId; }).forEach(function (comment) {
              commentSheetList.appendChild(renderCommentNode(comment, repliesByParent, false));
            });
          }
        } catch (e) {
          commentSheetList.innerHTML = '<p class="comment-sheet-empty">Could not load comments.</p>';
        }
      }

      commentSheetClose.addEventListener('click', function () {
        commentSheetOverlay.classList.remove('open');
        activePostId = null;
        closeMentionMenu();
      });
      commentSheetOverlay.addEventListener('click', function (e) {
        if (e.target === commentSheetOverlay) {
          commentSheetOverlay.classList.remove('open');
          activePostId = null;
          closeMentionMenu();
        }
      });
      csSubmit.addEventListener('click', async function () {
        if (!currentUser) { showAuthPrompt(); return; }
        var text = csInput.value.trim();
        if (!text || !activePostId) return;
        var comment = await postComment(activePostId, text);
        if (!comment) return;
        csInput.value = '';
        closeMentionMenu();
        await openCommentSheet(activePostId);
      });
      csInput.addEventListener('focus', function () {
        activeMentionInput = csInput;
        refreshMentionMenu(csInput);
      });
      csInput.addEventListener('input', function () { refreshMentionMenu(csInput); });
      csInput.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); csSubmit.click(); }
      });
      csInput.addEventListener('blur', function () {

        }, MENTION_MENU_BLUR_DELAY);

        moreSheetOverlay.classList.add('open');
      }
      document.getElementById('more-cancel').addEventListener('click', function () {
        moreSheetOverlay.classList.remove('open');
      });
      document.getElementById('more-not-interested').addEventListener('click', function () {
        moreSheetOverlay.classList.remove('open');
      });
      document.getElementById('more-report').addEventListener('click', function () {
        moreSheetOverlay.classList.remove('open');
      });
      moreSheetOverlay.addEventListener('click', function (e) {
        if (e.target === moreSheetOverlay) moreSheetOverlay.classList.remove('open');
      });

      /* ── Auth prompt ────────────────────────────────────────── */
      var authPromptOverlay = document.getElementById('auth-prompt-overlay');
      function showAuthPrompt() { authPromptOverlay.classList.add('open'); }
      document.getElementById('auth-prompt-cancel').addEventListener('click', function () {
        authPromptOverlay.classList.remove('open');
      });
      document.getElementById('auth-prompt-login').addEventListener('click', function () {
        window.location.href = 'index.html';
      });

      /* ── Footer nav ─────────────────────────────────────────── */
      var sfMarketplace = document.getElementById('sticky-footer-marketplace');
      var sfProfile = document.getElementById('sticky-footer-profile');
      if (sfMarketplace) sfMarketplace.addEventListener('click', function () { window.location.href = 'marketplace.html'; });
      if (sfProfile) sfProfile.addEventListener('click', function () { window.location.href = 'account-dashboard.html'; });

      /* ── Render clips ───────────────────────────────────────── */
      var container = document.getElementById('clips-container');

      async function renderClips(posts, accounts) {
        container.innerHTML = '';
        clips = [];

        if (!posts || posts.length === 0) {
          var empty = document.createElement('div');
          empty.className = 'clips-empty';
          empty.innerHTML = '<svg viewBox="0 0 24 24" aria-hidden="true"><polygon points="5 3 19 12 5 21 5 3"/></svg><h2>No Clips Yet</h2><p>Post a video on the home page and it will appear here as a clip.</p>';
          container.appendChild(empty);
          return;
        }

        var accountMap = {};
        accountLookup = {};
        accountAvatarCache = {};
        (accounts || []).forEach(function (a) {
          if (!a || !a.id) return;
          accountMap[a.id] = a;
          accountLookup[a.id] = a;
          var usernameKey = String(a.username || '').trim().toLowerCase();
          if (usernameKey) accountLookup[usernameKey] = a;
        });
        await Promise.all((accounts || []).map(async function (a) {
          if (!a || !a.id) return;
          var avatarUrl = await resolveUserAvatarUrl(a);
          accountAvatarCache[a.id] = avatarUrl || '';
          a.avatarUrl = avatarUrl;
        }));

        for (var i = 0; i < posts.length; i++) {
          var post = posts[i];
          var author = accountMap[post.userId] || null;
          var mediaId = getPostVideoMediaId(post) || null;
          if (!mediaId) continue;
          var mediaInfo = await loadMediaBlob(mediaId);
          if (!mediaInfo || !shouldTreatPostAsVideo(post, mediaInfo)) continue;
          var declaredVideoType = String(post.mediaType || '').trim().toLowerCase();
          var fallbackVideoType = declaredVideoType.indexOf('video/') === 0 ? declaredVideoType : 'video/*';
          // Some legacy records are valid videos but lack a MIME type in storage.
          // `video/*` remains safe here because this path is already gated by shouldTreatPostAsVideo().
          var normalizedMediaInfo = (!(mediaInfo.type || '').startsWith('video'))
            ? Object.assign({}, mediaInfo, { type: fallbackVideoType })
            : mediaInfo;
          var clipEl = buildClip(post, normalizedMediaInfo, author);
          container.appendChild(clipEl);
          clips.push(clipEl);
          observer.observe(clipEl);
        }
        ensureClipAudioInteractionHooks();
      }

      /* ── Sort / sample posts for clips ─────────────────────── */
      function pickClipPosts(posts) {
        return posts.filter(function (p) {
          return isPostPublished(p) && Boolean(getPostVideoMediaId(p));
        }).slice(0, MAX_CLIPS_COUNT);
      }

      /* ── Bootstrap ──────────────────────────────────────────── */
      openDB().then(async function () {
        currentUser = await loadCurrentUser();
        await applyStickyFooterAvatar();
        var posts = await getAllRecordsWithServerFallback(POSTS_STORE);
        var accounts = await getAllRecordsWithServerFallback(ACCOUNTS_STORE);
        /* Sort newest first */
        posts.sort(function (a, b) { return (b.createdAt || 0) - (a.createdAt || 0); });
        var selectedPosts = pickClipPosts(posts);
        await renderClips(selectedPosts, accounts);
        document.getElementById('clips-loading').style.display = 'none';
      }).catch(function (err) {
        console.error('Clips: DB error', err);
        document.getElementById('clips-loading').style.display = 'none';
        var empty = document.createElement('div');
        empty.className = 'clips-empty';
        empty.innerHTML = '<svg viewBox="0 0 24 24" aria-hidden="true"><polygon points="5 3 19 12 5 21 5 3"/></svg><h2>Clips Unavailable</h2><p>Could not load clips. Please try again later.</p>';
        container.appendChild(empty);
      });
    })();
    </script>
  </body>
</html>
