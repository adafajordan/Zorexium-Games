<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Account Dashboard &mdash; UltimeGames</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #050505;
        --surface: #111111;
        --surface-soft: #1c1c1c;
        --surface-muted: #151515;
        --text: #f5f5f5;
        --text-muted: #d6d6d6;
        --text-soft: #9f9f9f;
        --text-placeholder: #8f8f8f;
        --border: #2f2f2f;
        --border-strong: #4a4a4a;
        --focus: #ff3a3a;
        --accent: #ff2e2e;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: 'Orbitron', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #000;
        color: var(--text);
      }
      header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 16px;
        background: rgba(0, 0, 0, 0.94);
        position: sticky;
        top: 0;
        z-index: 50;
        border-bottom: 1px solid var(--border);
        backdrop-filter: blur(6px);
      }
      .brand {
        display: inline-flex;
        align-items: center;
        text-decoration: none;
        color: var(--text);
        font-weight: 700;
        letter-spacing: 0.05em;
      }
      .search {
        flex: 1;
        min-width: 120px;
        padding: 8px 10px;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: var(--surface);
        color: var(--text);
      }
      .search:focus,
      .auth-field input:focus {
        outline: 2px solid var(--focus);
        border-color: var(--focus);
      }
      .search::placeholder {
        color: var(--text-placeholder);
      }
      .header-actions,
      .header-icons {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      .auth-trigger {
        text-transform: lowercase;
      }
      .header-icon-btn {
        width: 42px;
        height: 42px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0;
      }
      .header-icon-btn svg {
        width: 20px;
        height: 20px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2.2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      button {
        border: 1px solid var(--border-strong);
        background: var(--surface-soft);
        color: var(--text);
        border-radius: 8px;
        padding: 8px 12px;
        cursor: pointer;
        font-family: inherit;
      }
      button:hover,
      .dashboard-link-button:hover {
        background: #2a1717;
        border-color: #6a2828;
      }
      .auth-modal {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 300;
        background: rgba(0,0,0,0.78);
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .auth-modal.open { display: flex; }
      .auth-panel {
        width: min(520px,100%);
        border: 1px solid var(--border-strong);
        border-radius: 12px;
        background: var(--surface);
        box-shadow: 0 24px 70px rgba(0,0,0,0.65);
        padding: 22px;
        position: relative;
      }
      .auth-close {
        position: absolute;
        top: 10px;
        right: 10px;
        width: 34px;
        height: 34px;
        border-radius: 999px;
        font-size: 18px;
        line-height: 1;
      }
      .auth-title {
        margin: 0 0 14px;
        color: var(--accent);
      }
      .auth-tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 16px;
      }
      .auth-tab {
        flex: 1;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-size: 11px;
      }
      .auth-tab.active {
        background: #2a1717;
        border-color: #7f3131;
      }
      .auth-form {
        display: none;
        flex-direction: column;
        gap: 12px;
      }
      .auth-form.active { display: flex; }
      .auth-field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .auth-field label {
        font-size: 12px;
        color: var(--text-muted);
      }
      .auth-field input {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 10px;
        background: var(--surface);
        color: var(--text);
        font-family: inherit;
      }
      .auth-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .auth-check {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        color: var(--text-muted);
      }
      .auth-link {
        color: var(--text-muted);
        text-decoration: none;
        font-size: 12px;
      }
      .auth-link-button {
        border: none;
        background: none;
        padding: 0;
      }
      .auth-submit {
        margin-top: 4px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-size: 11px;
      }
      .auth-status {
        min-height: 18px;
        margin: 4px 0 0;
        font-size: 12px;
        color: var(--text-muted);
      }
      .auth-status.error { color: #ff6d6d; }
      .auth-status.success { color: #8ef18e; }
      .page-shell {
        max-width: 1180px;
        margin: 0 auto;
        padding: 28px 20px 40px;
      }
      .page-intro {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 24px;
      }
      .page-intro h1 {
        margin: 0 0 10px;
        color: var(--accent);
      }
      .page-intro p {
        margin: 0;
        color: var(--text-muted);
        line-height: 1.7;
        max-width: 760px;
      }
      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: var(--text-soft);
        text-decoration: none;
        font-size: 12px;
        padding: 8px 12px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface-soft);
        white-space: nowrap;
      }
      .dashboard-panel {
        border: 1px solid var(--border);
        border-radius: 18px;
        background: linear-gradient(180deg, rgba(28, 28, 28, 0.98), rgba(17, 17, 17, 0.98));
        padding: 22px;
        box-shadow: 0 18px 48px rgba(0, 0, 0, 0.28);
      }
      .dashboard-panel h2 {
        margin: 0 0 18px;
        font-size: 18px;
        color: var(--text);
      }
      .dashboard-hero {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr) auto;
        gap: 18px;
        align-items: center;
      }
      .dashboard-avatar {
        width: 86px;
        height: 86px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 30px;
        font-weight: 700;
        color: #fff;
      }
      .dashboard-eyebrow {
        margin: 0 0 6px;
        color: var(--text-soft);
        font-size: 11px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }
      .dashboard-hero h1 {
        margin: 0 0 6px;
        font-size: 30px;
      }
      .dashboard-handle,
      .dashboard-email {
        margin: 0;
        color: var(--text-muted);
      }
      .dashboard-hero-meta {
        display: grid;
        gap: 12px;
        min-width: 220px;
      }
      .dashboard-meta-label {
        display: block;
        margin-bottom: 4px;
        font-size: 11px;
        letter-spacing: 0.12em;
        color: var(--text-soft);
        text-transform: uppercase;
      }
      .dashboard-hero-meta strong {
        font-size: 13px;
      }
      .dashboard-stats {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 16px;
        margin-top: 20px;
      }
      .dashboard-stat-card {
        border: 1px solid var(--border);
        border-radius: 16px;
        background: var(--surface-muted);
        padding: 18px;
      }
      .dashboard-stat-label {
        display: block;
        margin-bottom: 8px;
        color: var(--text-soft);
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
      .dashboard-stat-card strong {
        font-size: 28px;
      }
      .dashboard-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 20px;
        margin-top: 20px;
      }
      .dashboard-details {
        display: grid;
        gap: 14px;
        margin: 0;
      }
      .dashboard-details div {
        padding: 14px 16px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: rgba(255,255,255,0.02);
      }
      .dashboard-details dt {
        margin-bottom: 4px;
        color: var(--text-soft);
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
      .dashboard-details dd {
        margin: 0;
        color: var(--text-muted);
        word-break: break-word;
      }
      .dashboard-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      .dashboard-link-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 10px 14px;
        border-radius: 8px;
        border: 1px solid var(--border-strong);
        background: var(--surface-soft);
        color: var(--text);
        text-decoration: none;
      }
      .dashboard-post-list {
        list-style: none;
        padding: 0;
        margin: 0;
        display: grid;
        gap: 12px;
      }
      .dashboard-post-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 16px;
        border: 1px solid var(--border);
        border-radius: 14px;
        background: rgba(255,255,255,0.02);
      }
      .dashboard-post-item-empty {
        justify-content: flex-start;
      }
      .dashboard-post-copy {
        margin: 0 0 6px;
        color: var(--text-muted);
        line-height: 1.6;
      }
      .dashboard-post-meta {
        margin: 0;
        color: var(--text-soft);
        font-size: 12px;
      }
      .dashboard-delete-post {
        white-space: nowrap;
      }
      .dashboard-empty-state {
        text-align: center;
      }
      .dashboard-empty-state h1 {
        margin: 0 0 12px;
        color: var(--accent);
      }
      .dashboard-empty-state p {
        margin: 0 auto;
        max-width: 520px;
        color: var(--text-muted);
        line-height: 1.7;
      }
      .dashboard-empty-actions {
        display: inline-flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: center;
        margin-top: 18px;
      }
      @media (max-width: 900px) {
        .dashboard-hero,
        .dashboard-grid,
        .dashboard-stats {
          grid-template-columns: 1fr;
        }
        .dashboard-hero-meta {
          min-width: 0;
        }
      }
      @media (max-width: 700px) {
        header {
          flex-wrap: wrap;
        }
        .search {
          order: 3;
          width: 100%;
        }
        .page-shell {
          padding: 22px 14px 32px;
        }
        .page-intro {
          flex-direction: column;
        }
        .dashboard-hero {
          text-align: center;
        }
        .dashboard-avatar {
          margin: 0 auto;
        }
        .dashboard-post-item {
          flex-direction: column;
          align-items: stretch;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <a class="brand" href="index.html">UltimeGames</a>
      <input class="search" type="search" placeholder="search games" aria-label="Search games" />
      <div class="header-actions">
        <button id="login-button" class="auth-trigger" type="button">login</button>
        <button id="register-button" class="auth-trigger" type="button">register</button>
      </div>
      <div class="header-icons">
        <button id="header-profile-btn" class="header-icon-btn" type="button" aria-label="Profile" title="Profile">
          <svg aria-hidden="true" focusable="false" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </button>
      </div>
    </header>

    <div id="auth-modal" class="auth-modal" aria-hidden="true">
      <div class="auth-panel" role="dialog" aria-modal="true" aria-labelledby="auth-title">
        <button id="auth-close" class="auth-close" type="button" aria-label="Close">&#10005;</button>
        <h2 id="auth-title" class="auth-title">Welcome back</h2>
        <div class="auth-tabs" role="tablist">
          <button id="auth-tab-login" class="auth-tab active" type="button" role="tab" aria-selected="true" aria-controls="login-form" data-auth-view="login">Login</button>
          <button id="auth-tab-register" class="auth-tab" type="button" role="tab" aria-selected="false" aria-controls="register-form" data-auth-view="register">Sign Up</button>
        </div>
        <form id="login-form" class="auth-form active" novalidate>
          <div class="auth-field"><label for="login-email">Email</label><input id="login-email" name="email" type="email" autocomplete="email" required /></div>
          <div class="auth-field"><label for="login-password">Password</label><input id="login-password" name="password" type="password" autocomplete="current-password" minlength="8" required /></div>
          <div class="auth-row">
            <label class="auth-check" for="remember-login"><input id="remember-login" type="checkbox" />Keep me signed in</label>
            <button class="auth-link auth-link-button" type="button">Forgot password?</button>
          </div>
          <button class="auth-submit" type="submit">Log In</button>
        </form>
        <form id="register-form" class="auth-form" novalidate>
          <div class="auth-field"><label for="register-name">Name</label><input id="register-name" name="name" type="text" autocomplete="name" minlength="2" required /></div>
          <div class="auth-field"><label for="register-username">Username</label><input id="register-username" name="username" type="text" autocomplete="username" minlength="3" required /></div>
          <div class="auth-field"><label for="register-email">Email</label><input id="register-email" name="email" type="email" autocomplete="email" required /></div>
          <div class="auth-field"><label for="register-password">Password</label><input id="register-password" name="password" type="password" autocomplete="new-password" minlength="8" required /></div>
          <div class="auth-field"><label for="register-confirm-password">Confirm Password</label><input id="register-confirm-password" name="confirm-password" type="password" autocomplete="new-password" minlength="8" required /></div>
          <div class="auth-row"><label class="auth-check" for="accept-terms"><input id="accept-terms" type="checkbox" required />I agree to the terms and privacy policy</label></div>
          <button class="auth-submit" type="submit">Create Account</button>
        </form>
        <p id="auth-status" class="auth-status" aria-live="polite"></p>
      </div>
    </div>

    <main class="page-shell">
      <div class="page-intro">
        <div>
          <h1>Account dashboard</h1>
          <p>See your saved account details, published posts, uploaded media totals, and quick navigation from one place.</p>
        </div>
        <a href="index.html" class="back-link">&#8592; Back to home</a>
      </div>
      <div id="account-dashboard-root" aria-live="polite"></div>
    </main>

    <script>
      const authModal = document.getElementById('auth-modal');
      const authTitle = document.getElementById('auth-title');
      const authStatus = document.getElementById('auth-status');
      const authTabs = document.querySelectorAll('.auth-tab');
      const loginForm = document.getElementById('login-form');
      const registerForm = document.getElementById('register-form');
      const authCloseButton = document.getElementById('auth-close');
      const headerProfileBtn = document.getElementById('header-profile-btn');

      function setAuthStatus(message, type) {
        authStatus.textContent = message || '';
        authStatus.className = 'auth-status';
        if (type) authStatus.classList.add(type);
      }

      function switchAuthView(view) {
        const isLogin = view === 'login';
        loginForm.classList.toggle('active', isLogin);
        registerForm.classList.toggle('active', !isLogin);
        authTitle.textContent = isLogin ? 'Welcome back' : 'Create your account';
        authTabs.forEach(function(tab) {
          const selected = tab.getAttribute('data-auth-view') === view;
          tab.classList.toggle('active', selected);
          tab.setAttribute('aria-selected', selected ? 'true' : 'false');
        });
        setAuthStatus('');
      }

      function openAuthModal(view) {
        switchAuthView(view || 'login');
        authModal.classList.add('open');
        authModal.setAttribute('aria-hidden', 'false');
      }

      function closeAuthModal() {
        authModal.classList.remove('open');
        authModal.setAttribute('aria-hidden', 'true');
        setAuthStatus('');
      }

      document.getElementById('login-button').addEventListener('click', function() { openAuthModal('login'); });
      document.getElementById('register-button').addEventListener('click', function() { openAuthModal('register'); });
      headerProfileBtn.addEventListener('click', function() {
        if (document.body.getAttribute('data-authenticated') !== 'true') openAuthModal('login');
      });
      authCloseButton.addEventListener('click', closeAuthModal);
      authTabs.forEach(function(tab) {
        tab.addEventListener('click', function() {
          switchAuthView(tab.getAttribute('data-auth-view'));
        });
      });
      authModal.addEventListener('click', function(event) {
        if (event.target === authModal) closeAuthModal();
      });
      document.addEventListener('keydown', function(event) {
        if (event.key === 'Escape' && authModal.classList.contains('open')) closeAuthModal();
      });
    </script>
    <script src="app.js"></script>
  </body>
</html>
