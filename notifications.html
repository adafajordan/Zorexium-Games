<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Notifications — Zorexium</title>
    <style>
      :root { --bg:#000; --surface:#111; --surface-soft:#1a1a1a; --text:#eaeaea; --text-soft:#9f9f9f; --border:#2a2a2a; --accent:#3b82f6; }
      * { box-sizing:border-box; }
      body { margin:0; background:var(--bg); color:var(--text); font-family:Inter,system-ui,-apple-system,sans-serif; }
      header { position:sticky; top:0; z-index:20; display:flex; align-items:center; justify-content:space-between; padding:10px 14px; background:rgba(0,0,0,.9); border-bottom:1px solid var(--border); }
      .header-right { display:flex; gap:8px; }
      .header-icon-btn { border:none; background:transparent; color:var(--text); cursor:pointer; padding:6px; }
      .header-icon-btn:hover { color:var(--accent); }
      .header-title { margin:0; font-size:18px; font-weight:700; }
      main { max-width:720px; margin:0 auto; padding:14px 14px 90px; }
      .post-card { border:1px solid var(--border); border-radius:12px; background:var(--surface); padding:14px; margin-bottom:12px; }
      .post-card-empty { background:var(--surface-soft); }
      .post-empty-title { margin:0 0 6px; font-weight:700; }
      .post-empty-description, .post-handle { margin:0; color:var(--text-soft); font-size:13px; line-height:1.5; }
      .sticky-footer { position:fixed; left:0; right:0; bottom:0; display:flex; justify-content:space-around; border-top:1px solid var(--border); background:rgba(0,0,0,.94); padding:8px 0; }
      .sticky-footer-item { background:none; border:none; color:var(--text-soft); width:54px; height:34px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
      .sticky-footer-item.active, .sticky-footer-item:hover { color:var(--accent); }
      .sticky-footer-item svg { width:20px; height:20px; stroke:currentColor; fill:none; stroke-width:2; }
      .auth-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:40; align-items:center; justify-content:center; }
      .auth-modal.open { display:flex; }
      .auth-panel { width:min(92vw,420px); background:#0f0f0f; border:1px solid var(--border); border-radius:14px; padding:18px; }
      .auth-tabs { display:flex; gap:8px; margin-bottom:12px; }
      .auth-tab, .auth-submit { border:none; border-radius:8px; padding:8px 10px; cursor:pointer; }
      .auth-tab.active, .auth-submit { background:var(--accent); color:#fff; }
      .auth-form { display:none; }
      .auth-form.active { display:block; }
      .auth-field { display:flex; flex-direction:column; gap:4px; margin-bottom:8px; }
      .auth-field input { background:#0a0a0a; border:1px solid var(--border); color:var(--text); border-radius:8px; padding:8px 10px; }
      .auth-status { min-height:18px; color:#fca5a5; font-size:13px; }
    </style>
  </head>
  <body>
    <header>
      <h1 class="header-title">Notifications</h1>
      <div class="header-right">
        <button id="header-profile-btn" class="header-icon-btn" type="button" aria-label="Profile" title="Profile">
          <svg aria-hidden="true" focusable="false" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </button>
        <button id="header-notifications-btn" class="header-icon-btn" type="button" aria-label="Notifications" title="Notifications">
          <svg aria-hidden="true" focusable="false" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        </button>
      </div>
    </header>

    <main>
      <div id="notifications-list" aria-live="polite"></div>
    </main>

    <footer class="sticky-footer" aria-label="Quick navigation">
      <button class="sticky-footer-item" type="button" onclick="window.location.href='index.html'" aria-label="Home">
        <svg aria-hidden="true" focusable="false" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </button>
      <button id="sticky-footer-search" class="sticky-footer-item" type="button" aria-label="Search">
        <svg aria-hidden="true" focusable="false" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
      <button id="sticky-footer-profile" class="sticky-footer-item" type="button" aria-label="Profile">
        <svg aria-hidden="true" focusable="false" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </button>
      <button id="sticky-footer-notifications" class="sticky-footer-item active" type="button" aria-label="Notifications">
        <svg aria-hidden="true" focusable="false" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      </button>
      <button class="sticky-footer-item" type="button" onclick="window.location.href='account-dashboard.html'" aria-label="Dashboard">
        <svg aria-hidden="true" focusable="false" viewBox="0 0 24 24"><path d="M3 3h7v9H3z"/><path d="M14 3h7v5h-7z"/><path d="M14 12h7v9h-7z"/><path d="M3 16h7v5H3z"/></svg>
      </button>
    </footer>

    <div id="auth-modal" class="auth-modal" aria-hidden="true">
      <div class="auth-panel" role="dialog" aria-modal="true" aria-labelledby="auth-title">
        <button id="auth-close" class="header-icon-btn" type="button" aria-label="Close">✕</button>
        <h2 id="auth-title">Welcome back</h2>
        <div class="auth-tabs">
          <button id="auth-tab-login" class="auth-tab active" type="button" data-auth-view="login">Login</button>
          <button id="auth-tab-register" class="auth-tab" type="button" data-auth-view="register">Sign Up</button>
        </div>
        <form id="login-form" class="auth-form active" novalidate>
          <div class="auth-field"><label for="login-email">Email</label><input id="login-email" name="email" type="email" autocomplete="email" required /></div>
          <div class="auth-field"><label for="login-password">Password</label><input id="login-password" name="password" type="password" autocomplete="current-password" minlength="8" required /></div>
          <button class="auth-submit" type="submit">Log In</button>
        </form>
        <form id="register-form" class="auth-form" novalidate>
          <div class="auth-field"><label for="register-name">Name</label><input id="register-name" name="name" type="text" autocomplete="name" minlength="2" required /></div>
          <div class="auth-field"><label for="register-username">Username</label><input id="register-username" name="username" type="text" autocomplete="username" minlength="3" required /></div>
          <div class="auth-field"><label for="register-email">Email</label><input id="register-email" name="email" type="email" autocomplete="email" required /></div>
          <div class="auth-field"><label for="register-password">Password</label><input id="register-password" name="password" type="password" autocomplete="new-password" minlength="8" required /></div>
          <div class="auth-field"><label for="register-confirm-password">Confirm Password</label><input id="register-confirm-password" name="confirm-password" type="password" autocomplete="new-password" minlength="8" required /></div>
          <label><input id="accept-terms" type="checkbox" required /> I agree to the terms and privacy policy</label>
          <button class="auth-submit" type="submit">Create Account</button>
        </form>
        <p id="auth-status" class="auth-status" aria-live="polite"></p>
      </div>
    </div>

    <script>
      function toggleSearchBar() {}
    </script>
    <script src="app.js"></script>
  </body>
</html>
